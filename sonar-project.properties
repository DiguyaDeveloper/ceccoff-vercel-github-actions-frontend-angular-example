# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud — Ceccoff Frontend (Angular)
#
# Setup necessário:
#   1. Acesse https://sonarcloud.io e importe o repositório
#   2. Copie o Project Key e Organization gerados
#   3. Crie o secret SONAR_TOKEN no GitHub (Settings → Secrets → Actions)
#   4. Atualize sonar.projectKey e sonar.organization abaixo
# ──────────────────────────────────────────────────────────────────────────────

sonar.projectKey=ceccoff_ceccoff-frontend
sonar.organization=ceccoff
sonar.projectName=Ceccoff Frontend

# Código-fonte e testes
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=\
  **/*.spec.ts,\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  src/environments/**,\
  src/assets/**,\
  **/*.mock.ts

# Coverage (gerado por Jest via test:ci)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPaths=tsconfig.json
sonar.sourceEncoding=UTF-8

# Qualidade mínima (Quality Gate padrão do SonarCloud)
# Ajuste via interface do SonarCloud → Quality Gates
