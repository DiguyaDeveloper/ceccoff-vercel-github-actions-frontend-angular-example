# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔬 SAST — Code Security Analysis                                          ║
# ║                                                                              ║
# ║  Análise estática de segurança separada do pipeline de deploy.              ║
# ║  Executa em PRs (antes do merge) e semanalmente para coverage completo.    ║
# ║                                                                              ║
# ║  Por que separado do pipeline.yml?                                          ║
# ║    · Tags representam código já validado — SAST em tags é redundante       ║
# ║    · SAST pertence ao loop de feedback do desenvolvedor (PR → merge)        ║
# ║    · CodeQL (30min) + Semgrep bloqueiam PRDs desnecessariamente em tags     ║
# ║    · Schedule semanal garante cobertura sem atrasar deploys                 ║
# ║                                                                              ║
# ║  Jobs:                                                                       ║
# ║    codeql   → SAST nativo GitHub, resultados em Security → Code scanning   ║
# ║    semgrep  → Rules-based SAST (typescript, security-audit, owasp)         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 🔬 SAST — Code Security Analysis

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package*.json'
      - '.github/workflows/sast.yml'

  push:
    branches: [main]
    paths:
      - 'src/**'
      # package.json excluído intencionalmente: commits chore(release) [skip ci]
      # só tocam package.json e não devem disparar SAST

  schedule:
    - cron: '0 2 * * 1'  # Segunda-feira 02:00 UTC — cobertura semanal completa

  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# PRs: cancela runs anteriores ao receber novo push na mesma branch
# Schedule/push: nunca cancela
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: sast-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents:        read
  security-events: write  # necessário para upload de resultados SARIF (CodeQL)
  actions:         read

defaults:
  run:
    shell: bash

# ══════════════════════════════════════════════════════════════════════════════
# 📋 JOBS
# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  CodeQL — SAST nativo do GitHub                                           ║
  # ║  Detecta: injeção, XSS, path traversal, race conditions, etc.            ║
  # ║  Resultados visíveis em: Security → Code scanning alerts                 ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v6

      - name: 🔬 Inicializar CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # security-extended: regras adicionais de segurança além do padrão
          # security-and-quality: inclui qualidade de código
          queries: security-extended,security-and-quality

      - name: 🔬 Executar análise CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

      - name: 📊 Sumário — CodeQL
        if: always()
        run: |
          echo "## 🔬 CodeQL Analysis"                                              >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                    >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Detalhe |"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Linguagem  | TypeScript / JavaScript |"                        >> "$GITHUB_STEP_SUMMARY"
          echo "| 📋 Queries    | security-extended + security-and-quality |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| 📍 Resultados | Security → Code scanning alerts |"               >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔁 Trigger    | \`${{ github.event_name }}\` |"                   >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  Semgrep — Rules-based SAST                                               ║
  # ║  Open-source. Regras da comunidade para TypeScript/Angular/OWASP.        ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  semgrep:
    name: 🔍 Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Versão pinada para garantir reprodutibilidade e segurança (supply chain)
    # Atualize via Dependabot ou manualmente: https://hub.docker.com/r/semgrep/semgrep/tags
    container:
      image: semgrep/semgrep:1.84.0

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v6

      - name: 🔍 Semgrep — TypeScript + Security + Angular
        id: scan
        # continue-on-error: true permite que o SARIF seja sempre gerado e enviado
        # mesmo quando há findings — o passo seguinte falha explicitamente
        continue-on-error: true
        run: |
          semgrep scan \
            --config "p/typescript" \
            --config "p/javascript" \
            --config "p/security-audit" \
            --config "p/owasp-top-ten" \
            --sarif \
            --output semgrep-results.sarif \
            src/
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      # Upload SARIF → resultados aparecem em Security → Code scanning alerts
      # (mesmo canal do CodeQL — visão unificada de segurança)
      - name: 📤 Publicar resultados no GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category:   semgrep

      - name: 📊 Sumário — Semgrep
        if: always()
        run: |
          FINDINGS=$(python3 -c "
          import json, sys
          try:
            data = json.load(open('semgrep-results.sarif'))
            runs = data.get('runs', [{}])
            total = sum(len(r.get('results', [])) for r in runs)
            print(total)
          except: print('?')
          " 2>/dev/null || echo "?")

          if [[ "${FINDINGS}" == "0" ]]; then
            STATUS="✅ Nenhum finding"
          elif [[ "${FINDINGS}" == "?" ]]; then
            STATUS="⚠️ Não foi possível contar findings"
          else
            STATUS="⚠️ ${FINDINGS} finding(s) — ver Security → Code scanning"
          fi

          echo "## 🔍 Semgrep"                                                                >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                              >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Detalhe |"                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|"                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| 📋 Regras   | typescript · javascript · security-audit · owasp-top-ten |"  >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Findings | ${STATUS} |"                                                  >> "$GITHUB_STEP_SUMMARY"
          echo "| 📍 Resultados | [Security → Code scanning](../../security/code-scanning) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔁 Trigger  | \`${{ github.event_name }}\` |"                               >> "$GITHUB_STEP_SUMMARY"

      - name: ❌ Falhar se findings encontrados
        if: steps.scan.outputs.exit_code != '0'
        run: |
          echo "❌ Semgrep encontrou issues de segurança."
          echo "   Acesse Security → Code scanning alerts para detalhes."
          exit 1
