# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔥 HOTFIX — CECCOFF FRONTEND                                             ║
# ║                                                                              ║
# ║  Pipeline expedito para correções críticas em produção.                     ║
# ║  Fluxo: qualidade → DEV → aprovação emergencial → PRD → release            ║
# ║                                                                              ║
# ║  Diferenças do pipeline principal:                                          ║
# ║    · Sem HML (bypass de staging)                                            ║
# ║    · Sem matrix de Node (single run)                                        ║
# ║    · Sem CodeQL/Semgrep (lento demais para emergência)                     ║
# ║    · npm audit --audit-level=critical (não HIGH, para não bloquear)        ║
# ║    · GitHub Release marcado como pre-release automaticamente               ║
# ║                                                                              ║
# ║  Triggers:                                                                   ║
# ║    · Tag semântica: v*-hotfix.*, v*-critical.*, v*-patch.*                  ║
# ║    · Manual: workflow_dispatch (versão + motivo obrigatórios)               ║
# ║                                                                              ║
# ║  ⚠️  Use apenas para emergências. PRs normais → pipeline.yml               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 🔥 Hotfix

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-hotfix.*'
      - 'v[0-9]+.[0-9]+.[0-9]+-critical.*'
      - 'v[0-9]+.[0-9]+.[0-9]+-patch.*'

  workflow_dispatch:
    inputs:
      version:
        description: '🏷️ Tag do hotfix (ex: v1.2.1-hotfix.1)'
        required: true
        type: string
      reason:
        description: '📝 Motivo do hotfix (obrigatório para auditoria)'
        required: true
        type: string
      skip_dev:
        description: '⚠️ Pular DEV — apenas para emergências críticas'
        type: boolean
        default: false

concurrency:
  group: hotfix-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_PRIMARY: '22.x'
  APP_NAME:     'ceccoff-frontend'

permissions:
  contents:    read
  deployments: write

defaults:
  run:
    shell: bash

jobs:

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 1 — Setup                                                          ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  setup:
    name: 🏷️ Setup & Versão
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      version:   ${{ steps.version.outputs.tag }}
      sha_short: ${{ steps.version.outputs.sha }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏷️ Detectar versão
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.version }}"
          fi
          SHA="${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

          {
            echo "## 🔥 Hotfix — \`${TAG}\` — SHA: \`${SHA}\`"
            echo ""
            [[ -n "${{ inputs.reason }}" ]] && echo "> 📝 **Motivo:** ${{ inputs.reason }}"
            echo ""
            echo "| Campo  | Valor |"
            echo "|--------|-------|"
            echo "| Tag    | \`${TAG}\` |"
            echo "| SHA    | \`${SHA}\` |"
            echo "| Actor  | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2 — Qualidade (paralela, expedita)                                ║
  # ║  Usa composite actions. audit-level=critical para não bloquear hotfix.   ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6

      - name: 🔍 Lint & Type Check
        uses: ./.github/actions/ci-lint
        with:
          node-version: ${{ env.NODE_PRIMARY }}

  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6

      - name: 🧪 Testes
        uses: ./.github/actions/ci-test
        with:
          node-version:    ${{ env.NODE_PRIMARY }}
          upload-artifact: 'false'
          comment-pr:      'false'

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6

      - name: 🔒 Security Audit
        uses: ./.github/actions/ci-security
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          audit-level:  'critical'

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — Deploy DEV (opcional, pulável em emergência)                  ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-dev:
    name: 🔵 Deploy → DEV
    needs: [setup, lint, test, security]
    if: ${{ inputs.skip_dev != true }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment:        dev
      github-environment: 'DEV - Deploy'
      label:              DEV
      emoji:              '🔵'
      config:             development
      version:            ${{ needs.setup.outputs.version }}
      sha-short:          ${{ needs.setup.outputs.sha_short }}
      build-script:       build:dev
    secrets:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      API_URL:           ${{ secrets.DEV_API_URL }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 4 — Aprovação Emergencial → PRD                                   ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  approve-prd:
    name: 🚨 Aprovação Emergencial → PRD
    runs-on: ubuntu-latest
    needs: [setup, lint, test, security, deploy-dev]
    timeout-minutes: 60
    if: >-
      always() &&
      needs.setup.result    == 'success' &&
      needs.lint.result     == 'success' &&
      needs.test.result     == 'success' &&
      needs.security.result == 'success' &&
      (needs.deploy-dev.result == 'success' || needs.deploy-dev.result == 'skipped')

    environment:
      name: HML - Liberar PRD

    steps:
      - name: 🚨 Aguardando aprovação emergencial
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          {
            echo "## 🚨 Aprovação Emergencial — Hotfix → PRD"
            echo ""
            echo "Hotfix **\`${VERSION}\`** pronto para produção."
            [[ -n "${{ inputs.reason }}" ]] && echo "> 📝 **Motivo:** ${{ inputs.reason }}"
            echo ""
            echo "| Ação | Resultado |"
            echo "|------|-----------|"
            echo "| ✅ **APROVAR**  | Dispara deploy em PRD imediatamente |"
            echo "| ❌ **REJEITAR** | Hotfix cancelado — corrija e re-tagueie |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: ✅ Hotfix aprovado
        run: echo "🚨 PRD liberado por @${{ github.actor }} em $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 5 — Deploy PRD                                                    ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-prd:
    name: 🔴 Deploy → PRD
    needs: [setup, approve-prd]
    if: ${{ needs.approve-prd.result == 'success' }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment:        prd
      github-environment: 'PRD - Deploy'
      label:              'PRODUÇÃO (Hotfix)'
      emoji:              '🔴'
      config:             production
      version:            ${{ needs.setup.outputs.version }}
      sha-short:          ${{ needs.setup.outputs.sha_short }}
      build-script:       build:prod
      prod:               'true'
      strict-health:      'true'
      health-retries:     '10'
      health-wait:        '15'
    secrets:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      API_URL:           ${{ secrets.PRD_API_URL }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRD }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 6 — Release (pre-release automático)                              ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  release:
    name: 🎉 Release Hotfix
    runs-on: ubuntu-latest
    needs: [setup, deploy-prd]
    if: ${{ needs.deploy-prd.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: write
      actions:  write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔥 Criar GitHub Release (pre-release)
        uses: ./.github/actions/create-release
        with:
          version:      ${{ needs.setup.outputs.version }}
          github-token: ${{ github.token }}
          repo:         ${{ github.repository }}
          prerelease:   'true'
          no-latest:    'true'
          reason:       ${{ inputs.reason }}
          prd-url:      ${{ needs.deploy-prd.outputs.url }}

      - name: 📊 Sumário — Hotfix Concluído
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          REPO="${{ github.repository }}"
          {
            echo "## 🔥 Hotfix Concluído — \`${VERSION}\`"
            echo ""
            echo "| Ambiente | Status |"
            echo "|----------|--------|"
            echo "| 🔵 DEV   | $([[ '${{ inputs.skip_dev }}' == 'true' ]] && echo '⏭️ Pulado' || echo '✅ Deployado') |"
            echo "| 🔴 PRD   | ✅ Live |"
            echo ""
            echo "| Item | Detalhe |"
            echo "|------|---------|"
            echo "| 🏷️ Versão  | \`${VERSION}\` (pre-release) |"
            echo "| 📦 Release | [${VERSION}](https://github.com/${REPO}/releases/tag/${VERSION}) |"
            echo "| 👤 Por     | @${{ github.actor }} — $(date -u '+%Y-%m-%d %H:%M UTC') |"
            [[ -n "${{ inputs.reason }}" ]] && echo "| 📝 Motivo  | ${{ inputs.reason }} |"
          } >> "$GITHUB_STEP_SUMMARY"
