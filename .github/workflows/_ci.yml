# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  ♻️  REUSABLE — CI (Lint, Testes, Coverage)                                ║
# ║  Chamado por: pipeline.yml                                                  ║
# ║  NÃO acessa secrets de produção                                              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: ♻️ CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Versão do Node.js'
        type: string
        default: '20.x'
      force-version:
        description: 'Forçar versão/tag (ex: v1.2.3). Vazio = detecta automaticamente.'
        type: string
        default: ''
    outputs:
      version:
        description: 'Tag semântica detectada (ex: v1.2.3)'
        value: ${{ jobs.ci.outputs.version }}
      sha_short:
        description: 'SHA curto do commit (7 chars)'
        value: ${{ jobs.ci.outputs.sha_short }}

jobs:
  ci:
    name: 📦 CI — Lint & Testes
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    outputs:
      version:   ${{ steps.version.outputs.tag }}
      sha_short: ${{ steps.version.outputs.sha }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Detectar versão
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.force-version }}" ]]; then
            TAG="${{ inputs.force-version }}"
          else
            TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0-dev')"
          fi
          SHA="${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "### 🏷️ Versão: \`${TAG}\` — SHA: \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: 🟢 Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      - name: 🔍 Lint & Type Check
        id: lint
        run: npm run lint

      - name: 🧪 Testes unitários
        id: tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: 📈 Publicar cobertura no sumário
        if: always()
        run: |
          if [[ -f coverage/ceccoff-frontend/coverage-summary.json ]]; then
            LINES=$(jq '.total.lines.pct' coverage/ceccoff-frontend/coverage-summary.json 2>/dev/null || echo 'N/A')
            STMTS=$(jq '.total.statements.pct' coverage/ceccoff-frontend/coverage-summary.json 2>/dev/null || echo 'N/A')
            echo "| 📊 Coverage (lines) | ${LINES}% |" >> "$GITHUB_STEP_SUMMARY"
            echo "| 📊 Coverage (stmts) | ${STMTS}% |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📦 Upload relatório de coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ steps.version.outputs.sha }}
          path: coverage/
          retention-days: 7

      - name: 📊 Sumário — CI
        if: always()
        run: |
          echo "## 📦 CI — Lint & Testes"                                                  >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                            >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Resultado |"                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----------|"                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão | \`${{ steps.version.outputs.tag }}\` |"                      >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔑 SHA    | \`${{ steps.version.outputs.sha }}\` |"                      >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Lint   | $([[ '${{ steps.lint.outcome }}' == 'success' ]] && echo '✅ Passou' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🧪 Testes | $([[ '${{ steps.tests.outcome }}' == 'success' ]] && echo '✅ Passou' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Por    | @${{ github.actor }} — $(date -u '+%Y-%m-%d %H:%M UTC') |"   >> "$GITHUB_STEP_SUMMARY"
