# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🔍 PR CHECKS — CECCOFF FRONTEND                                          ║
# ║                                                                              ║
# ║  Executa em todo Pull Request aberto para main.                             ║
# ║  Todos os jobs são required checks para merge (configure em Branch Rules).  ║
# ║                                                                              ║
# ║  Jobs:                                                                       ║
# ║    · pr-title  → Conventional Commits no título do PR                       ║
# ║    · lint      → ci-lint action (ESLint + tsc)                             ║
# ║    · test      → ci-test action (Node 22, coverage + comentário no PR)     ║
# ║    · security  → ci-security action (npm audit HIGH+CRITICAL)              ║
# ║                                                                              ║
# ║  Trunk-Based: PRs vivem horas, não dias. Checks rápidos = merge rápido.    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 🔍 PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents:      read
  pull-requests: write
  statuses:      write

env:
  NODE_VERSION: '22.x'

defaults:
  run:
    shell: bash

jobs:

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  Título do PR — Conventional Commits                                      ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  pr-title:
    name: 📝 Título — Conventional Commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.pull_request.draft == false

    steps:
      - name: 📝 Validar título do PR
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            O título do PR deve iniciar com letra minúscula.
            ✅ Correto:   feat(auth): adicionar login com OAuth2
            ❌ Incorreto: feat(auth): Adicionar login com OAuth2

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  Lint & Type Check                                                        ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false

    steps:
      - name: 🔍 Lint & Type Check
        uses: ./.github/actions/ci-lint
        with:
          node-version: ${{ env.NODE_VERSION }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  Testes — Node 22 (sem matrix para feedback rápido em PRs)               ║
  # ║  Matrix completa (20+22) roda apenas na pipeline de release (tag).       ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false

    steps:
      - name: 🧪 Testes + Coverage
        uses: ./.github/actions/ci-test
        with:
          node-version:            ${{ env.NODE_VERSION }}
          upload-artifact:         'true'
          artifact-name:           coverage-pr-${{ github.event.pull_request.number }}-${{ github.sha }}
          artifact-retention-days: '7'
          comment-pr:              'true'

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  Security Audit                                                           ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.draft == false

    steps:
      - name: 🔒 Security Audit
        uses: ./.github/actions/ci-security
        with:
          node-version: ${{ env.NODE_VERSION }}
          audit-level:  'high'
