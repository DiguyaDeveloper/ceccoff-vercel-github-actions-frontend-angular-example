# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  ♻️  REUSABLE — Gate de Verificação (Aprovação Manual)                      ║
# ║  Chamado por: pipeline.yml                                                  ║
# ║  Parâmetros: environment, environment-name, version, is-final               ║
# ║  Se is-final=true: rejeita gates pendentes via PAT_REJECT_TOKEN             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
name: ♻️ Gate

on:
  workflow_call:
    inputs:
      environment:
        description: 'Ambiente: dev | hml | prd'
        type: string
        required: true
      environment-name:
        description: 'Nome do GitHub Environment (ex: DEV - Verificar)'
        type: string
        required: true
      version:
        description: 'Versão em verificação'
        type: string
        required: true
      sha-short:
        description: 'SHA curto do commit'
        type: string
        default: ''
      is-final:
        description: 'true = gate final do pipeline (rejeita gates pendentes ao aprovar)'
        type: boolean
        default: false
    outputs:
      version:
        description: 'Versão aprovada (relay para próximo job)'
        value: ${{ jobs.gate.outputs.version }}
      sha_short:
        description: 'SHA aprovado (relay para próximo job)'
        value: ${{ jobs.gate.outputs.sha_short }}

jobs:
  gate:
    name: >-
      ${{
        inputs.environment == 'dev' && '✅ Verificação DEV — Finalizar ou Rollback' ||
        inputs.environment == 'hml' && '✅ Verificação HML — Aprovar para liberar PRD' ||
        '🎯 Verificação PRD — Finalizar ou Rollback'
      }}
    runs-on: ubuntu-latest

    permissions:
      deployments: write

    outputs:
      version:   ${{ inputs.version }}
      sha_short: ${{ inputs.sha-short }}

    environment:
      name: ${{ inputs.environment-name }}

    steps:
      - name: 🔍 Gate — aguardando verificação
        run: |
          case "${{ inputs.environment }}" in
            dev)
              echo "## ✅ Gate de Verificação — DEV"                                         >> "$GITHUB_STEP_SUMMARY"
              echo ""                                                                          >> "$GITHUB_STEP_SUMMARY"
              echo "Versão **\`${{ inputs.version }}\`** está live em DEV."                   >> "$GITHUB_STEP_SUMMARY"
              echo ""                                                                          >> "$GITHUB_STEP_SUMMARY"
              echo "| Ação | Resultado |"                                                     >> "$GITHUB_STEP_SUMMARY"
              echo "|------|-----------|"                                                     >> "$GITHUB_STEP_SUMMARY"
              echo "| ✅ **FINALIZAR** | Ciclo DEV encerrado com sucesso |"                  >> "$GITHUB_STEP_SUMMARY"
              echo "| ↩️ **ROLLBACK**  | Rejeite e execute workflow **↩️ Rollback** → dev |" >> "$GITHUB_STEP_SUMMARY"
              ;;
            hml)
              echo "## ✅ Gate de Verificação — HML"                                         >> "$GITHUB_STEP_SUMMARY"
              echo ""                                                                          >> "$GITHUB_STEP_SUMMARY"
              echo "Versão **\`${{ inputs.version }}\`** está live em HML."                   >> "$GITHUB_STEP_SUMMARY"
              echo ""                                                                          >> "$GITHUB_STEP_SUMMARY"
              echo "| Ação | Resultado |"                                                     >> "$GITHUB_STEP_SUMMARY"
              echo "|------|-----------|"                                                     >> "$GITHUB_STEP_SUMMARY"
              echo "| ✅ **APROVAR**  | Libera deploy em PRD automaticamente |"              >> "$GITHUB_STEP_SUMMARY"
              echo "| ❌ **REJEITAR** | Execute workflow **↩️ Rollback** → \`hml\` |"        >> "$GITHUB_STEP_SUMMARY"
              ;;
            prd)
              echo "## 🎯 Gate de Verificação — PRD"                                         >> "$GITHUB_STEP_SUMMARY"
              echo ""                                                                          >> "$GITHUB_STEP_SUMMARY"
              echo "Versão **\`${{ inputs.version }}\`** está live em PRODUÇÃO."              >> "$GITHUB_STEP_SUMMARY"
              echo ""                                                                          >> "$GITHUB_STEP_SUMMARY"
              echo "| Ação | Resultado |"                                                     >> "$GITHUB_STEP_SUMMARY"
              echo "|------|-----------|"                                                     >> "$GITHUB_STEP_SUMMARY"
              echo "| ✅ **FINALIZAR** | Release encerrado com sucesso |"                    >> "$GITHUB_STEP_SUMMARY"
              echo "| ↩️ **ROLLBACK**  | Rejeite e execute workflow **↩️ Rollback** → prd |" >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

      # ── Notificação Slack pré-PRD (só no gate HML) ──────────────────────────
      - name: 📣 Notificar Slack — Deploy PRD iniciando
        if: ${{ inputs.environment == 'hml' }}
        run: |
          VERSION="${{ inputs.version }}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{\"text\":\"🚀 Deploy PRD iniciando — \`${VERSION}\` autorizado por @${ACTOR} em ${TIMESTAMP}\"}"

          echo "✅ [FAKE] Notificação PRÉ-PRD enviada ao Slack — versão \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: 🎉 Gate aprovado
        run: |
          echo "✅ **${{ inputs.environment-name }}** aprovado por @${{ github.actor }} em $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"

      # ── Notificação Slack pós-PRD (só no gate final) ────────────────────────
      - name: 📣 Notificar Slack — Deploy PRD SUCESSO
        if: ${{ inputs.is-final }}
        run: |
          VERSION="${{ inputs.version }}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{\"text\":\"✅ Deploy PRD SUCESSO — \`${VERSION}\` em ${TIMESTAMP}\"}"

          echo "✅ [FAKE] Notificação PÓS-PRD enviada ao Slack — versão \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"

      # ── Rejeitar gates pendentes (ex: verify-dev) ao finalizar PRD ──────────
      - name: 🧹 Rejeitar gates pendentes
        if: ${{ inputs.is-final }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REJECT_TOKEN }}
          script: |
            const { data: pending } = await github.rest.actions.getPendingDeploymentsForRun({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              run_id: context.runId
            });

            if (pending.length === 0) {
              console.log('✅ Nenhum deployment pendente — nada a rejeitar.');
              return;
            }

            const envIds = pending.map(d => d.environment.id);
            console.log(`🧹 Rejeitando ${pending.length} gate(s) pendente(s): ${pending.map(d => d.environment.name).join(', ')}`);

            try {
              await github.rest.actions.reviewPendingDeploymentsForRun({
                owner:           context.repo.owner,
                repo:            context.repo.repo,
                run_id:          context.runId,
                environment_ids: envIds,
                state:           'rejected',
                comment:         '🤖 Rejeitado automaticamente — PRD aprovado com sucesso.'
              });
              console.log('✅ Gates pendentes rejeitados com sucesso.');
            } catch (e) {
              if (e.status === 422) {
                console.log('ℹ️ Nenhum gate pendente elegível para rejeição (já aprovado ou expirado).');
              } else {
                throw e;
              }
            }
