# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║         🚀 PIPELINE CI/CD — CECCOFF FRONTEND (Angular 19 + Vercel)        ║
# ║                                                                              ║
# ║  Estratégia: Trunk-Based Development com Tags Semânticas                    ║
# ║  Build:      Separado por ambiente via angular.json fileReplacements        ║
# ║              environment.<env>.ts gerado em CI com secrets do GitHub        ║
# ║  Ambientes:  DEV (independente) → HML → PRD (sequencial)                   ║
# ║  Aprovações: Todas as etapas requerem aprovação manual                      ║
# ║  Rollback:   Rastreia tag deployada por ambiente via GitHub Deployments API ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 🚀 Pipeline CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# 🎯 TRIGGERS
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # v1.0.0, v2.3.1, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-*' # v1.0.0-rc.1, v1.0.0-hotfix.1, etc.

  workflow_dispatch:
    inputs:
      skip_dev:
        description: '⏭️ Pular deploy em DEV'
        type: boolean
        default: false
        required: false
      skip_hml:
        description: '⏭️ Pular deploy em HML (PRD não será executado)'
        type: boolean
        default: false
        required: false
      force_version:
        description: '🏷️ Versão/Tag para forçar deploy (ex: v1.2.3). Padrão: tag atual'
        type: string
        required: false

# ─────────────────────────────────────────────────────────────────────────────
# 🔒 CONCORRÊNCIA — Evita deploys paralelos no mesmo ambiente
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# 🌍 VARIÁVEIS GLOBAIS
# ─────────────────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: '20.x'
  APP_NAME: 'ceccoff-frontend'

# ══════════════════════════════════════════════════════════════════════════════
# 📋 JOBS
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  📦 CI — Lint, testes e validação (SEM build de produção)                ║
  # ║  O build de produção acontece individualmente em cada job de deploy,     ║
  # ║  pois variáveis VITE_* são injetadas em tempo de build por ambiente.     ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  ci:
    name: 📦 CI — Lint & Testes
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.tag }}
      sha_short: ${{ steps.version.outputs.sha }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Detectar versão
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.force_version }}" ]]; then
            TAG="${{ inputs.force_version }}"
          else
            TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0-dev')"
          fi

          SHA="${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "### 🏷️ Versão: \`${TAG}\` — SHA: \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        id: install
        run: npm ci --prefer-offline

      - name: 🔍 Lint & Type Check
        id: lint
        run: npm run lint

      - name: 🧪 Testes unitários
        id: tests
        run: npm run test:ci

      - name: 📈 Publicar cobertura no sumário
        if: always()
        run: |
          SUMMARY_FILE="coverage/coverage-summary.json"
          if [[ -f "$SUMMARY_FILE" ]]; then
            STMTS=$(jq '.total.statements.pct' "$SUMMARY_FILE")
            BRANCH=$(jq '.total.branches.pct'  "$SUMMARY_FILE")
            FUNCS=$(jq  '.total.functions.pct'  "$SUMMARY_FILE")
            LINES=$(jq  '.total.lines.pct'      "$SUMMARY_FILE")

            echo "## 📈 Coverage Report"                                         >> "$GITHUB_STEP_SUMMARY"
            echo ""                                                               >> "$GITHUB_STEP_SUMMARY"
            echo "| Métrica     | Cobertura                                     |" >> "$GITHUB_STEP_SUMMARY"
            echo "|-------------|-----------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Statements  | ${STMTS}%                                     |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Branches    | ${BRANCH}%                                    |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Functions   | ${FUNCS}%                                     |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Lines       | ${LINES}%                                     |" >> "$GITHUB_STEP_SUMMARY"
            echo ""                                                               >> "$GITHUB_STEP_SUMMARY"
            echo "> Relatório HTML disponível como artefato."                    >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ coverage-summary.json não encontrado."                     >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📦 Upload relatório de coverage (artefato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ steps.version.outputs.sha }}
          path: coverage/
          retention-days: 14

      - name: 📊 Sumário — CI
        if: always()
        run: |
          echo "## 📦 Relatório CI"                                                    >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Item           | Status                                             |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------------|-----------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão      | \`${{ steps.version.outputs.tag }}\`              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔑 SHA         | \`${{ steps.version.outputs.sha }}\`              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Lint        | $([[ '${{ steps.lint.outcome }}' == 'success' ]] && echo '✅ Passou' || echo '❌ Falhou')   |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🧪 Testes      | $([[ '${{ steps.tests.outcome }}' == 'success' ]] && echo '✅ Passou' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Disparado por | @${{ github.actor }}                            |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Data        | $(date -u '+%Y-%m-%d %H:%M:%S UTC')               |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "> ⚠️ **Nota:** O build de produção é gerado separadamente em cada ambiente" >> "$GITHUB_STEP_SUMMARY"
          echo "> com as variáveis de ambiente corretas (\`VITE_*\`).                  " >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔵 DEPLOY DEV — Aprovação integrada no próprio job via environment gate ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-dev:
    name: 🔵 Deploy → DEV
    runs-on: ubuntu-latest
    needs: [ci]
    if: ${{ inputs.skip_dev != true }}
    permissions:
      deployments: write
      contents: read

    environment:
      name: DEV - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci.outputs.version != 'v0.0.0-dev' && needs.ci.outputs.version || github.sha }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      # ── Gera environment.development.ts com os secrets corretos ─────────────
      # Angular usa fileReplacements: este arquivo substitui environment.ts
      # em tempo de build via angular.json configuration=development.
      # Adicione novas propriedades aqui E em environment.ts (interface base).
      - name: 🔧 Gerar environment.development.ts com secrets — DEV
        run: |
          cat > src/environments/environment.development.ts << 'EOF'
          export const environment = {
            name:       'development',
            production: false,
            apiUrl:     '${{ secrets.DEV_API_URL }}',
            version:    '${{ needs.ci.outputs.version }}',
          };
          EOF
          echo "✅ environment.development.ts gerado"

      - name: 🏗️ Build Angular — DEV (ng build --configuration=development)
        id: build
        run: |
          npm run build:dev
          echo "✅ Build DEV gerado"
          echo "**📊 Bundles DEV:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh dist/**/* 2>/dev/null | sort -h >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🗂️ Criar estrutura Vercel Build Output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/ceccoff-frontend/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'VCEOF'
          {
            "version": 3,
            "routes": [
              {"src":"/assets/(.*)","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.js","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.css","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/index\\.html","headers":{"cache-control":"no-cache, no-store, must-revalidate"},"continue":true},
              {"handle":"filesystem"},
              {"src":"/(.*)","dest":"/index.html"}
            ]
          }
          VCEOF
          echo "✅ Vercel Build Output pronto em .vercel/output/"

      - name: 🔵 Deploy em DEV (Vercel Preview)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt \
            --token="$VERCEL_TOKEN" \
            --yes \
            --meta version="${{ needs.ci.outputs.version }}" \
            --meta sha="${{ needs.ci.outputs.sha_short }}" \
            --meta environment=dev \
            2>/dev/null)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "❌ Vercel não retornou URL. Output de diagnóstico:"
            vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes --meta environment=dev 2>&1 || true
            echo ""
            echo "Verifique os secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_DEV"
            exit 1
          fi

          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Deploy DEV: ${DEPLOY_URL}"

      # ── Salva a versão deployada para rastreamento de rollback ────────────────
      - name: 💾 Registrar versão deployada em DEV
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Version: ${{ needs.ci.outputs.version }}'
            }).catch(() => {
              // Ignora erros — o registro é best-effort
              console.log('Deployment status registration skipped');
            });

            // Salva a versão como variável de ambiente reutilizável
            core.exportVariable('DEPLOYED_VERSION_DEV', '${{ needs.ci.outputs.version }}');

      - name: 🏥 Health Check DEV
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS="unhealthy"
          for i in {1..6}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${URL}" || echo "000")
            # 200 = OK  |  401 = Vercel Deployment Protection ativa (servidor no ar)
            if [[ "${HTTP_CODE}" == "200" || "${HTTP_CODE}" == "401" ]]; then
              STATUS="healthy"
              [[ "${HTTP_CODE}" == "401" ]] && echo "ℹ️ HTTP 401 — preview protegido por Vercel Auth (normal em preview)"
              break
            fi
            echo "⏳ Tentativa ${i}/6 — HTTP ${HTTP_CODE}"; sleep 10
          done
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: 📊 Sumário — Deploy DEV
        if: always()
        run: |
          echo "## 🔵 Relatório Deploy — DEV"                                          >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Item             | Detalhe                                          |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------------|--------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão        | \`${{ needs.ci.outputs.version }}\`             |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔑 SHA           | \`${{ needs.ci.outputs.sha_short }}\`           |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚙️ Configuração   | ng build --configuration=development           |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 URL           | ${{ steps.deploy.outputs.url }}                  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build         | $([[ '${{ steps.build.outcome }}' == 'success' ]] && echo '✅ Gerado' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏥 Health Check  | $([[ '${{ steps.health.outputs.status }}' == 'healthy' ]] && echo '✅ Saudável' || echo '⚠️ Verificar') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Aprovado por  | @${{ github.actor }}                             |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Deploy em     | $(date -u '+%Y-%m-%d %H:%M:%S UTC')              |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "> 💡 Aprove o gate abaixo para **finalizar** o ciclo DEV."             >> "$GITHUB_STEP_SUMMARY"
          echo "> ↩️ Para rollback: rejeite o gate e execute o workflow **↩️ Rollback** → ambiente \`dev\`." >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  ✅ VERIFICAÇÃO DEV — Gate pós-deploy                                    ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  verify-dev:
    name: ✅ Verificação DEV — Finalizar ou Rollback
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: ${{ needs.deploy-dev.result == 'success' }}

    environment:
      name: DEV - Verificar

    steps:
      - name: 🔍 Gate — aguardando verificação DEV
        run: |
          echo "## ✅ Gate de Verificação — DEV"                                        >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                        >> "$GITHUB_STEP_SUMMARY"
          echo "Versão **\`${{ needs.ci.outputs.version }}\`** está live em DEV."       >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                        >> "$GITHUB_STEP_SUMMARY"
          echo "| Ação              | Resultado                                        |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------------|--------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ✅ **FINALIZAR**  | Ciclo DEV encerrado com sucesso                  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ↩️ **ROLLBACK**   | Rejeite e execute workflow **↩️ Rollback** → dev |" >> "$GITHUB_STEP_SUMMARY"

      - name: 🎉 DEV finalizado com sucesso
        run: |
          echo "✅ DEV aprovado por @${{ github.actor }} em $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🟡 DEPLOY HML — Aprovação integrada no próprio job via environment gate ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-hml:
    name: 🟡 Deploy → HML
    runs-on: ubuntu-latest
    needs: [ci]
    if: ${{ inputs.skip_hml != true }}
    permissions:
      deployments: write
      contents: read

    environment:
      name: HML - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci.outputs.version != 'v0.0.0-dev' && needs.ci.outputs.version || github.sha }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      # ── Captura a versão ATUAL de HML antes de sobrescrever (para rollback) ──
      - name: 💾 Registrar versão anterior de HML (snapshot pré-deploy)
        id: snapshot
        uses: actions/github-script@v7
        with:
          script: |
            // Busca o último deployment bem-sucedido em HML
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'hml',
              per_page: 5
            }).catch(() => ({ data: [] }));

            let prevVersion = 'none';
            let prevUrl = '';

            for (const dep of deployments.data) {
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: dep.id,
                per_page: 1
              }).catch(() => ({ data: [] }));

              const latest = statuses.data[0];
              if (latest?.state === 'success') {
                prevVersion = dep.description?.replace('Version: ', '') || dep.ref;
                prevUrl = latest.environment_url || '';
                break;
              }
            }

            core.setOutput('prev_version', prevVersion);
            core.setOutput('prev_url', prevUrl);
            console.log(`Versão anterior em HML: ${prevVersion}`);

      - name: 🔧 Gerar environment.staging.ts com secrets — HML
        run: |
          cat > src/environments/environment.staging.ts << 'EOF'
          export const environment = {
            name:       'staging',
            production: false,
            apiUrl:     '${{ secrets.HML_API_URL }}',
            version:    '${{ needs.ci.outputs.version }}',
          };
          EOF
          echo "✅ environment.staging.ts gerado"

      - name: 🏗️ Build Angular — HML (ng build --configuration=staging)
        id: build
        run: |
          npm run build:staging
          echo "✅ Build HML gerado"
          echo "**📊 Bundles HML:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh dist/**/* 2>/dev/null | sort -h >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🗂️ Criar estrutura Vercel Build Output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/ceccoff-frontend/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'VCEOF'
          {
            "version": 3,
            "routes": [
              {"src":"/assets/(.*)","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.js","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.css","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/index\\.html","headers":{"cache-control":"no-cache, no-store, must-revalidate"},"continue":true},
              {"handle":"filesystem"},
              {"src":"/(.*)","dest":"/index.html"}
            ]
          }
          VCEOF
          echo "✅ Vercel Build Output pronto em .vercel/output/"

      - name: 🟡 Deploy em HML (Vercel Preview)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_HML }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt \
            --token="$VERCEL_TOKEN" \
            --yes \
            --meta version="${{ needs.ci.outputs.version }}" \
            --meta sha="${{ needs.ci.outputs.sha_short }}" \
            --meta environment=hml \
            --meta prev_version="${{ steps.snapshot.outputs.prev_version }}" \
            2>/dev/null)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "❌ Vercel não retornou URL. Output de diagnóstico:"
            vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes --meta environment=hml 2>&1 || true
            echo ""
            echo "Verifique os secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_HML"
            exit 1
          fi

          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Deploy HML: ${DEPLOY_URL}"

      # ── Salva deployment no histórico (usado pelo Rollback para detectar versão) ─
      - name: 💾 Registrar versão deployada em HML
        id: register
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.ci.outputs.version }}',
              environment: 'hml',
              description: 'Version: ${{ needs.ci.outputs.version }}',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Version: ${{ needs.ci.outputs.version }}'
            });

            core.setOutput('deployment_id', deployment.data.id);
            console.log(`Deployment registrado: ID ${deployment.data.id}`);

      - name: 🏥 Health Check HML
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS="unhealthy"
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}" || echo "000")
            # 200 = OK  |  401 = Vercel Deployment Protection ativa (servidor no ar)
            if [[ "${HTTP_CODE}" == "200" || "${HTTP_CODE}" == "401" ]]; then
              STATUS="healthy"
              [[ "${HTTP_CODE}" == "401" ]] && echo "ℹ️ HTTP 401 — preview protegido por Vercel Auth (normal em preview)"
              break
            fi
            echo "⏳ Tentativa ${i}/10 — HTTP ${HTTP_CODE}"; sleep 15
          done
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          [[ "${STATUS}" == "healthy" ]] || exit 1

      - name: 📊 Sumário — Deploy HML
        if: always()
        run: |
          echo "## 🟡 Relatório Deploy — HML"                                          >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Item              | Detalhe                                         |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------------|-------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão         | \`${{ needs.ci.outputs.version }}\`            |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔑 SHA            | \`${{ needs.ci.outputs.sha_short }}\`          |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚙️ Configuração    | ng build --configuration=staging              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 Versão anterior| \`${{ steps.snapshot.outputs.prev_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 URL            | ${{ steps.deploy.outputs.url }}                 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build          | $([[ '${{ steps.build.outcome }}' == 'success' ]] && echo '✅ Gerado' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏥 Health Check   | $([[ '${{ steps.health.outputs.status }}' == 'healthy' ]] && echo '✅ Saudável' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Aprovado por   | @${{ github.actor }}                            |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Deploy em      | $(date -u '+%Y-%m-%d %H:%M:%S UTC')             |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "> 💡 Approve a verificação HML abaixo para liberar o deploy em PRD."   >> "$GITHUB_STEP_SUMMARY"
          echo "> ↩️ Para rollback: workflow **↩️ Rollback** → versão anterior será \`${{ steps.snapshot.outputs.prev_version }}\`." >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  ✅ VERIFICAÇÃO HML — Gate de qualidade pós-deploy                       ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  verify-hml:
    name: ✅ Verificação HML — Aprovar para liberar PRD
    runs-on: ubuntu-latest
    needs: [deploy-hml]
    if: ${{ needs.deploy-hml.result == 'success' }}

    environment:
      name: HML - Liberar PRD

    steps:
      - name: 🔍 Gate — aguardando verificação da equipe
        run: |
          echo "## ✅ Gate de Verificação — HML"                                       >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "Versão **\`${{ needs.ci.outputs.version }}\`** está live em HML."      >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Ação           | Resultado                                          |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------------|----------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ✅ **APROVAR** | Libera deploy em PRD automaticamente               |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ❌ **REJEITAR**| Execute workflow **↩️ Rollback** → ambiente \`hml\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: 🎯 HML aprovada — registrando autorização para PRD
        run: |
          echo "✅ HML aprovada por @${{ github.actor }} em $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "📣 Notificação Slack será enviada antes do deploy em PRD."                         >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  📣 NOTIFICAÇÃO PRÉ-PRD — Avisa o time antes de ir a produção            ║
  # ║                                                                            ║
  # ║  Fake notifier: simula envio para Slack com output no sumário.            ║
  # ║  Para integrar de verdade: substituir o step por webhook real.            ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  notify-pre-prd:
    name: 📣 Notificar Slack — Deploy PRD iniciando
    runs-on: ubuntu-latest
    needs: [ci, verify-hml]
    if: ${{ needs.verify-hml.result == 'success' }}

    steps:
      - name: 📣 [FAKE] Enviar notificação Slack
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          VERSION="${{ needs.ci.outputs.version }}"
          SHA="${{ needs.ci.outputs.sha_short }}"
          ACTOR="${{ github.actor }}"

          # ── Simula payload que seria enviado ao Slack ────────────────────────
          cat << SLACK
          {
            "channel": "#deployments",
            "text": "🚀 *CECCOFF — Deploy PRD Iniciando*",
            "blocks": [
              {
                "type": "header",
                "text": { "type": "plain_text", "text": "🚀 Deploy em Produção" }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Versão:*\n\`${VERSION}\`" },
                  { "type": "mrkdwn", "text": "*SHA:*\n\`${SHA}\`" },
                  { "type": "mrkdwn", "text": "*Autorizado por:*\n@${ACTOR}" },
                  { "type": "mrkdwn", "text": "*Horário:*\n${TIMESTAMP}" },
                  { "type": "mrkdwn", "text": "*HML:*\n✅ Aprovado e verificado" },
                  { "type": "mrkdwn", "text": "*Status:*\n⏳ Aguardando gate PRD" }
                ]
              }
            ]
          }
          SLACK

          # ── Para usar de verdade: descomente e adicione SLACK_WEBHOOK_URL ───
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{\"text\":\"🚀 Deploy PRD iniciando — versão \`${VERSION}\` autorizado por @${ACTOR}\"}"

          echo "✅ [FAKE] Notificação enviada ao Slack"

      - name: 📊 Sumário — Notificação PRÉ-PRD
        run: |
          echo "## 📣 Notificação Slack — PRÉ-PRD"                                          >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                             >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`"                                                                      >> "$GITHUB_STEP_SUMMARY"
          echo "🚀 CECCOFF — Deploy PRD Iniciando"                                          >> "$GITHUB_STEP_SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"                                         >> "$GITHUB_STEP_SUMMARY"
          echo "📦 Versão : ${{ needs.ci.outputs.version }}"                                >> "$GITHUB_STEP_SUMMARY"
          echo "🔑 SHA    : ${{ needs.ci.outputs.sha_short }}"                              >> "$GITHUB_STEP_SUMMARY"
          echo "✅ HML    : Aprovado e verificado"                                          >> "$GITHUB_STEP_SUMMARY"
          echo "👤 Por    : @${{ github.actor }}"                                           >> "$GITHUB_STEP_SUMMARY"
          echo "🕐 Em     : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"                           >> "$GITHUB_STEP_SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"                                         >> "$GITHUB_STEP_SUMMARY"
          echo "⏳ Aguardando gate de aprovação PRD..."                                     >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`"                                                                      >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                             >> "$GITHUB_STEP_SUMMARY"
          echo "> 💡 Para ativar: adicione secret \`SLACK_WEBHOOK_URL\` e descomente o curl no step acima." >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔴 DEPLOY PRD — Depende de notify-pre-prd                              ║
  # ║                                                                            ║
  # ║  Build com: variáveis de produção                                        ║
  # ║  Salva a tag atual antes de deployar (usada pelo Rollback)               ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-prd:
    name: 🔴 Deploy → PRD
    runs-on: ubuntu-latest
    needs: [ci, notify-pre-prd]
    if: ${{ needs.notify-pre-prd.result == 'success' }}
    permissions:
      deployments: write
      contents: read

    outputs:
      url:          ${{ steps.deploy.outputs.url }}
      prev_version: ${{ steps.snapshot.outputs.prev_version }}
      prev_url:     ${{ steps.snapshot.outputs.prev_url }}

    environment:
      name: PRD - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci.outputs.version != 'v0.0.0-dev' && needs.ci.outputs.version || github.sha }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      # ── Captura a versão ATUAL de PRD antes de sobrescrever (para rollback) ──
      - name: 💾 Registrar versão anterior de PRD (snapshot pré-deploy)
        id: snapshot
        uses: actions/github-script@v7
        with:
          script: |
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'prd',
              per_page: 5
            }).catch(() => ({ data: [] }));

            let prevVersion = 'none';
            let prevUrl = '';

            for (const dep of deployments.data) {
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: dep.id,
                per_page: 1
              }).catch(() => ({ data: [] }));

              const latest = statuses.data[0];
              if (latest?.state === 'success') {
                prevVersion = dep.description?.replace('Version: ', '') || dep.ref;
                prevUrl = latest.environment_url || '';
                break;
              }
            }

            core.setOutput('prev_version', prevVersion);
            core.setOutput('prev_url', prevUrl);
            console.log(`Versão anterior em PRD: ${prevVersion}`);

      - name: 🔧 Gerar environment.production.ts com secrets — PRD
        run: |
          cat > src/environments/environment.production.ts << 'EOF'
          export const environment = {
            name:       'production',
            production: true,
            apiUrl:     '${{ secrets.PRD_API_URL }}',
            version:    '${{ needs.ci.outputs.version }}',
          };
          EOF
          echo "✅ environment.production.ts gerado"

      - name: 🏗️ Build Angular — PRD (ng build --configuration=production)
        id: build
        run: |
          npm run build:prod
          echo "✅ Build PRD gerado"
          echo "**📊 Bundles PRD:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh dist/**/* 2>/dev/null | sort -h >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🗂️ Criar estrutura Vercel Build Output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/ceccoff-frontend/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'VCEOF'
          {
            "version": 3,
            "routes": [
              {"src":"/assets/(.*)","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.js","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.css","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/index\\.html","headers":{"cache-control":"no-cache, no-store, must-revalidate"},"continue":true},
              {"handle":"filesystem"},
              {"src":"/(.*)","dest":"/index.html"}
            ]
          }
          VCEOF
          echo "✅ Vercel Build Output pronto em .vercel/output/"

      - name: 🔴 Deploy em PRD (Vercel Production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRD }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token="$VERCEL_TOKEN" \
            --yes \
            --meta version="${{ needs.ci.outputs.version }}" \
            --meta sha="${{ needs.ci.outputs.sha_short }}" \
            --meta environment=prd \
            --meta prev_version="${{ steps.snapshot.outputs.prev_version }}" \
            2>/dev/null)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "❌ Vercel não retornou URL. Output de diagnóstico:"
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --yes --meta environment=prd 2>&1 || true
            echo ""
            echo "Verifique os secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_PRD"
            exit 1
          fi

          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Deploy PRD: ${DEPLOY_URL}"

      # ── Salva deployment no histórico (usado pelo Rollback) ───────────────────
      - name: 💾 Registrar versão deployada em PRD
        id: register
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.ci.outputs.version }}',
              environment: 'prd',
              description: 'Version: ${{ needs.ci.outputs.version }}',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Version: ${{ needs.ci.outputs.version }}'
            });

            core.setOutput('deployment_id', deployment.data.id);
            console.log(`Deployment PRD registrado: ID ${deployment.data.id}`);

      - name: 🏥 Health Check PRD
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS="unhealthy"
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}" || echo "000")
            if [[ "${HTTP_CODE}" == "200" ]]; then
              STATUS="healthy"; break
            fi
            echo "⏳ Tentativa ${i}/10 — HTTP ${HTTP_CODE}"; sleep 15
          done
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          if [[ "${STATUS}" == "unhealthy" ]]; then
            echo "❌ Health check PRD falhou — considere rollback imediato!"; exit 1
          fi

      - name: 📊 Sumário — Deploy PRD
        if: always()
        run: |
          echo "## 🔴 Relatório Deploy — PRODUÇÃO"                                     >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Item              | Detalhe                                         |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------------|-------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão         | \`${{ needs.ci.outputs.version }}\`            |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔑 SHA            | \`${{ needs.ci.outputs.sha_short }}\`          |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚙️ Configuração    | ng build --configuration=production           |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 Versão anterior| \`${{ steps.snapshot.outputs.prev_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 URL            | ${{ steps.deploy.outputs.url }}                 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build          | $([[ '${{ steps.build.outcome }}' == 'success' ]] && echo '✅ Gerado' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏥 Health Check   | $([[ '${{ steps.health.outputs.status }}' == 'healthy' ]] && echo '✅ Saudável' || echo '❌ CRÍTICO') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Aprovado por   | @${{ github.actor }}                            |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Deploy em      | $(date -u '+%Y-%m-%d %H:%M:%S UTC')             |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "> 💡 Approve a verificação final abaixo para encerrar o ciclo."        >> "$GITHUB_STEP_SUMMARY"
          echo "> ↩️ Para rollback: workflow **↩️ Rollback** → versão anterior será \`${{ steps.snapshot.outputs.prev_version }}\`." >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🎯 VERIFICAÇÃO PRD — Gate final com notificação de sucesso ou falha     ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  verify-prd:
    name: 🎯 Verificação PRD — Finalizar ou Rollback
    runs-on: ubuntu-latest
    needs: [ci, deploy-hml, verify-hml, notify-pre-prd, deploy-prd]
    if: ${{ needs.deploy-prd.result == 'success' }}

    environment:
      name: PRD - Finalizar Release

    steps:
      - name: 🔍 Gate — aguardando verificação final
        run: |
          echo "## 🎯 Gate de Verificação Final — PRODUÇÃO"                               >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                          >> "$GITHUB_STEP_SUMMARY"
          echo "⚡ **Versão \`${{ needs.ci.outputs.version }}\` está LIVE em Produção!**" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                          >> "$GITHUB_STEP_SUMMARY"
          echo "| Ação                         | Resultado                               |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------------------------|-----------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ✅ **FINALIZAR COM SUCESSO** | Notifica Slack ✅ e encerra o ciclo      |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ❌ **REJEITAR (ROLLBACK)**   | Notifica Slack 🚨 — execute ↩️ Rollback  |" >> "$GITHUB_STEP_SUMMARY"

      - name: 📣 [FAKE] Notificar Slack — Deploy PRD SUCESSO
        run: |
          VERSION="${{ needs.ci.outputs.version }}"
          SHA="${{ needs.ci.outputs.sha_short }}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          # ── Simula payload de sucesso ────────────────────────────────────────
          cat << SLACK
          {
            "channel": "#deployments",
            "text": "✅ *CECCOFF — Deploy PRD Concluído com Sucesso*",
            "attachments": [{
              "color": "#36a64f",
              "fields": [
                { "title": "Versão", "value": "${VERSION}", "short": true },
                { "title": "SHA", "value": "${SHA}", "short": true },
                { "title": "Aprovado por", "value": "@${ACTOR}", "short": true },
                { "title": "Horário", "value": "${TIMESTAMP}", "short": true }
              ]
            }]
          }
          SLACK

          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{\"text\":\"✅ Deploy PRD *${VERSION}* concluído com sucesso por @${ACTOR}\"}"

          echo "✅ [FAKE] Notificação de SUCESSO enviada ao Slack"

      - name: 🎉 Release encerrado com sucesso
        run: |
          echo "## 🎉 Release Concluído!"                                              >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Ambiente  | Status                                                  |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|------------------------------------------------------   |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔵 DEV    | ✅ Deployado e Verificado (ciclo independente)          |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟡 HML    | ${{ needs.deploy-hml.result == 'success' && '✅ Deployado e Verificado' || '—' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 PRD    | ✅ Deployado e Verificado                               |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Item              | Detalhe                                         |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------------|-------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão         | \`${{ needs.ci.outputs.version }}\`            |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔑 SHA            | \`${{ needs.ci.outputs.sha_short }}\`          |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Finalizado por | @${{ github.actor }}                            |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Encerrado em   | $(date -u '+%Y-%m-%d %H:%M:%S UTC')             |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "> 📣 Notificação de sucesso enviada ao Slack."                         >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  ⏪ CONFIRMAR ROLLBACK PRD                                               ║
  # ║                                                                            ║
  # ║  Acionado automaticamente quando verify-prd é REJEITADO (cancelled).     ║
  # ║                                                                            ║
  # ║  Por que dois gates?                                                       ║
  # ║    1. verify-prd rejeitado → pode ser engano ou instabilidade momentânea  ║
  # ║    2. confirm-rollback-prd exige uma segunda confirmação EXPLÍCITA de     ║
  # ║       que o rollback deve ser executado — evita rollback acidental.       ║
  # ║                                                                            ║
  # ║  Se APROVADO → execute-rollback-prd rebuilda e deploya a versão anterior  ║
  # ║  Se REJEITADO → pipeline encerra (versão atual permanece em PRD)          ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  confirm-rollback-prd:
    name: ⏪ Confirmar Rollback PRD
    runs-on: ubuntu-latest
    needs: [ci, deploy-prd, verify-prd]
    if: |
      needs.deploy-prd.result == 'success' &&
      (needs.verify-prd.result == 'cancelled' || needs.verify-prd.result == 'failure')

    environment:
      name: PRD - Confirmar Rollback

    steps:
      - name: ⏪ Aguardando confirmação de rollback
        run: |
          VERSION="${{ needs.ci.outputs.version }}"
          PREV="${{ needs.deploy-prd.outputs.prev_version }}"

          echo "## ⏪ Confirmação de Rollback — PRODUÇÃO"                                  >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "⚠️ **O gate de verificação PRD foi rejeitado.**"                           >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Item               | Detalhe                                            |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------------|--------------------------------------------------  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Versão atual    | \`${VERSION}\` (será revertida)                   |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🎯 Reverter para   | \`${PREV:-desconhecida}\` (versão anterior em PRD)|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Rejeitado por   | @${{ github.actor }}                               |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Em              | $(date -u '+%Y-%m-%d %H:%M:%S UTC')                |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "> ✅ **APROVAR** este gate para executar o rollback automaticamente."      >> "$GITHUB_STEP_SUMMARY"
          echo "> ❌ **REJEITAR** para cancelar (versão atual permanece em PRD)."         >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔁 EXECUTAR ROLLBACK PRD — Inline após confirmação                      ║
  # ║                                                                            ║
  # ║  Rebuilda a versão anterior com as variáveis de produção e faz deploy.   ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  execute-rollback-prd:
    name: 🔁 Rollback PRD → ${{ needs.deploy-prd.outputs.prev_version }}
    runs-on: ubuntu-latest
    needs: [ci, deploy-prd, verify-prd, confirm-rollback-prd]
    if: needs.confirm-rollback-prd.result == 'success'
    permissions:
      deployments: write
      contents: read

    environment:
      name: PRD - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout versão anterior (${{ needs.deploy-prd.outputs.prev_version }})
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.deploy-prd.outputs.prev_version }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      - name: 🔧 Gerar environment.production.ts — PRD (rollback)
        run: |
          cat > src/environments/environment.production.ts << 'EOF'
          export const environment = {
            name:       'production',
            production: true,
            apiUrl:     '${{ secrets.PRD_API_URL }}',
            version:    '${{ needs.deploy-prd.outputs.prev_version }}',
          };
          EOF
          echo "✅ environment.production.ts gerado (rollback inline)"

      - name: 🏗️ Build Angular versão ${{ needs.deploy-prd.outputs.prev_version }} — PRD
        id: build
        run: |
          npm run build:prod
          echo "✅ Build rollback PRD gerado"

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🗂️ Criar estrutura Vercel Build Output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/ceccoff-frontend/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'VCEOF'
          {
            "version": 3,
            "routes": [
              {"src":"/assets/(.*)","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.js","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.css","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/index\\.html","headers":{"cache-control":"no-cache, no-store, must-revalidate"},"continue":true},
              {"handle":"filesystem"},
              {"src":"/(.*)","dest":"/index.html"}
            ]
          }
          VCEOF

      - name: ↩️ Deploy rollback em PRD
        id: deploy
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRD }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token="$VERCEL_TOKEN" \
            --yes \
            --meta version="${{ needs.deploy-prd.outputs.prev_version }}" \
            --meta environment=prd \
            --meta rollback=true \
            --meta rollback_from="${{ needs.ci.outputs.version }}" \
            2>/dev/null)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "❌ Vercel não retornou URL."
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --yes 2>&1 || true
            exit 1
          fi
          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Rollback PRD deployado: ${DEPLOY_URL}"

      - name: 💾 Registrar rollback no histórico de PRD
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.deploy-prd.outputs.prev_version }}',
              environment: 'prd',
              description: 'Version: ${{ needs.deploy-prd.outputs.prev_version }}',
              auto_merge: false,
              required_contexts: []
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Rollback from ${{ needs.ci.outputs.version }}'
            });

      - name: 🏥 Health Check pós-rollback PRD
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS="unhealthy"
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}" || echo "000")
            if [[ "${HTTP_CODE}" == "200" ]]; then STATUS="healthy"; break; fi
            echo "⏳ Tentativa ${i}/10 — HTTP ${HTTP_CODE}"; sleep 15
          done
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          if [[ "${STATUS}" == "unhealthy" ]]; then
            echo "❌ CRÍTICO: Health check pós-rollback PRD falhou!"; exit 1
          fi

      - name: 📣 [FAKE] Notificar Slack — Rollback PRD executado
        if: always()
        run: |
          VERSION="${{ needs.ci.outputs.version }}"
          PREV="${{ needs.deploy-prd.outputs.prev_version }}"
          ACTOR="${{ github.actor }}"
          RESULT="${{ job.status }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          ICON=$([[ "${RESULT}" == "success" ]] && echo "⏪" || echo "🚨")

          cat << SLACK
          {
            "channel": "#deployments",
            "text": "${ICON} *CECCOFF — Rollback PRD ${RESULT}*",
            "attachments": [{
              "color": "$([[ "${RESULT}" == "success" ]] && echo "#ff9900" || echo "#ff0000")",
              "fields": [
                { "title": "Revertido de", "value": "${VERSION}", "short": true },
                { "title": "Restaurado para", "value": "${PREV}", "short": true },
                { "title": "Executado por", "value": "@${ACTOR}", "short": true },
                { "title": "Horário", "value": "${TIMESTAMP}", "short": true }
              ]
            }]
          }
          SLACK

          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{\"text\":\"${ICON} Rollback PRD *${VERSION}* → *${PREV}* por @${ACTOR}\"}"

          echo "${ICON} [FAKE] Notificação de rollback enviada ao Slack"

      - name: 📊 Sumário — Rollback PRD
        if: always()
        run: |
          RESULT="${{ job.status }}"
          ICON=$([[ "${RESULT}" == "success" ]] && echo "⏪" || echo "🚨")

          echo "## ${ICON} Rollback PRD — $(date -u '+%Y-%m-%d %H:%M UTC')"               >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Item                | Detalhe                                          |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------------------|--------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ♻️ Revertido de     | \`${{ needs.ci.outputs.version }}\` → \`${{ needs.deploy-prd.outputs.prev_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 URL              | ${{ steps.deploy.outputs.url }}                  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build            | $([[ '${{ steps.build.outcome }}' == 'success' ]] && echo '✅ Gerado' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏥 Health Check     | $([[ '${{ steps.health.outputs.status }}' == 'healthy' ]] && echo '✅ Saudável' || echo '🚨 CRÍTICO') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Executado por    | @${{ github.actor }}                             |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Executado em     | $(date -u '+%Y-%m-%d %H:%M:%S UTC')              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏁 Resultado        | ${ICON} ${RESULT}                                |" >> "$GITHUB_STEP_SUMMARY"
