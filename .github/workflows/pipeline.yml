# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║         🚀 PIPELINE CI/CD — CECCOFF FRONTEND (Angular 19 + Vercel)         ║
# ║                                                                              ║
# ║  Arquitetura: Enterprise Orchestrator + Reusable Workflows                  ║
# ║  Estratégia:  Trunk-Based Development com Tags Semânticas                   ║
# ║  Ambientes:   DEV (independente) → HML → PRD (sequencial)                  ║
# ║                                                                              ║
# ║  Workflows reutilizáveis:                                                    ║
# ║    _ci.yml     → Lint, testes e cobertura                                   ║
# ║    _deploy.yml → Build Angular + Deploy Vercel + Health Check               ║
# ║    _gate.yml   → Gate de aprovação manual + rejeição de pendentes           ║
# ║                                                                              ║
# ║  Composite Actions (usadas dentro de _deploy.yml):                          ║
# ║    .github/actions/setup-deps          → Node + npm ci + Vercel CLI        ║
# ║    .github/actions/vercel-build-output → Prepara .vercel/output/           ║
# ║    .github/actions/register-deployment → GitHub Deployments API            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 🚀 Pipeline CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# 🎯 TRIGGERS
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'    # v1.0.0, v2.3.1, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # v1.0.0-rc.1, v1.0.0-hotfix.1, etc.

  workflow_dispatch:
    inputs:
      skip_dev:
        description: '⏭️ Pular deploy em DEV'
        type: boolean
        default: false
        required: false
      skip_hml:
        description: '⏭️ Pular deploy em HML (PRD não será executado)'
        type: boolean
        default: false
        required: false
      force_version:
        description: '🏷️ Versão/Tag para forçar deploy (ex: v1.2.3). Padrão: tag atual'
        type: string
        required: false

# ─────────────────────────────────────────────────────────────────────────────
# 🔒 CONCORRÊNCIA — Evita deploys paralelos no mesmo ambiente
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

# ══════════════════════════════════════════════════════════════════════════════
# 📋 JOBS — Apenas orquestração, zero lógica de negócio
#
#  Grafo visual (GitHub Actions UI):
#
#  ci ──┬── deploy-dev ── verify-dev (continue-on-error)
#       │
#       └── deploy-hml ── verify-hml ── deploy-prd ── verify-prd
#
# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ── 📦 CI ──────────────────────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/_ci.yml
    with:
      force-version: ${{ inputs.force_version || '' }}
      node-version: '20.x'

  # ── 🔵 DEV ────────────────────────────────────────────────────────────────
  deploy-dev:
    needs: [ci]
    if: ${{ inputs.skip_dev != true }}
    uses: ./.github/workflows/_deploy.yml
    with:
      environment:      dev
      environment-name: DEV - Deploy
      version:          ${{ needs.ci.outputs.version }}
      sha-short:        ${{ needs.ci.outputs.sha_short }}
      app-name:         ceccoff-frontend
      node-version:     '20.x'
    secrets: inherit

  verify-dev:
    needs: [deploy-dev]
    if: ${{ needs.deploy-dev.result == 'success' }}
    continue-on-error: true   # Gate paralelo — timeout/cancel não afeta status geral
    uses: ./.github/workflows/_gate.yml
    with:
      environment:      dev
      environment-name: DEV - Verificar
      version:          ${{ needs.deploy-dev.outputs.version }}
      sha-short:        ${{ needs.deploy-dev.outputs.sha_short }}
      is-final:         false
    secrets: inherit

  # ── 🟡 HML ────────────────────────────────────────────────────────────────
  deploy-hml:
    needs: [ci]
    if: ${{ inputs.skip_hml != true }}
    uses: ./.github/workflows/_deploy.yml
    with:
      environment:      hml
      environment-name: HML - Deploy
      version:          ${{ needs.ci.outputs.version }}
      sha-short:        ${{ needs.ci.outputs.sha_short }}
      app-name:         ceccoff-frontend
      node-version:     '20.x'
    secrets: inherit

  verify-hml:
    needs: [deploy-hml]
    if: ${{ needs.deploy-hml.result == 'success' }}
    uses: ./.github/workflows/_gate.yml
    with:
      environment:      hml
      environment-name: HML - Liberar PRD
      version:          ${{ needs.deploy-hml.outputs.version }}
      sha-short:        ${{ needs.deploy-hml.outputs.sha_short }}
      is-final:         false
    secrets: inherit

  # ── 🔴 PRD ────────────────────────────────────────────────────────────────
  deploy-prd:
    needs: [verify-hml]
    if: ${{ needs.verify-hml.result == 'success' }}
    uses: ./.github/workflows/_deploy.yml
    with:
      environment:      prd
      environment-name: PRD - Deploy
      version:          ${{ needs.verify-hml.outputs.version }}
      sha-short:        ${{ needs.verify-hml.outputs.sha_short }}
      app-name:         ceccoff-frontend
      node-version:     '20.x'
    secrets: inherit

  verify-prd:
    needs: [deploy-prd]
    if: ${{ needs.deploy-prd.result == 'success' }}
    uses: ./.github/workflows/_gate.yml
    with:
      environment:      prd
      environment-name: PRD - Finalizar Release
      version:          ${{ needs.deploy-prd.outputs.version }}
      sha-short:        ${{ needs.deploy-prd.outputs.sha_short }}
      is-final:         true   # Rejeita gates pendentes (ex: verify-dev) ao aprovar
    secrets: inherit
