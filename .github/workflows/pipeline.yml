# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║         🚀 PIPELINE CI/CD — CECCOFF FRONTEND (Angular 21 + Vercel)        ║
# ║                                                                              ║
# ║  Estratégia: Trunk-Based Development com Tags Semânticas                    ║
# ║  Build:      Separado por ambiente via angular.json fileReplacements        ║
# ║              environment.<env>.ts gerado em CI com secrets do GitHub        ║
# ║                                                                              ║
# ║  Stages:                                                                     ║
# ║    1 · setup      → detecta versão/SHA                                      ║
# ║    2 · lint       → ci-lint action (ESLint + tsc)                          ║
# ║      · test       → ci-test action (matrix Node 20+22)                     ║
# ║      · security   → ci-security action (npm audit HIGH+CRITICAL)           ║
# ║      · quality-gate → agrega lint+test+security                            ║
# ║    3 · deploy-dev + deploy-hml (paralelos, via reusable-deploy.yml)        ║
# ║    4 · deploy-prd → gate humano via GitHub Environment "PRD - Deploy"      ║
# ║    5 · release    → GitHub Release com changelog automático                 ║
# ║                                                                              ║
# ║  Como releases são criadas:                                                  ║
# ║    PR merge → release-automation.yml (semantic-release)                     ║
# ║    → bumpa package.json + cria tag vX.Y.Z → dispara este pipeline          ║
# ║                                                                              ║
# ║  Reusable Workflow:                                                          ║
# ║    reusable-deploy.yml → encapsula ciclo completo de deploy por ambiente    ║
# ║      setup-deps → generate-env → build → vercel-build-output               ║
# ║      → vercel-deploy → register-deployment → health-check → deploy-summary ║
# ║                                                                              ║
# ║  SAST (CodeQL + Semgrep): ver sast.yml — roda em PRs e semanalmente        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 🚀 Pipeline CI/CD

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'    # v1.0.0, v2.3.1 — release estável
      - 'v[0-9]*.[0-9]*.[0-9]*-*'  # v1.0.0-rc.1, v1.0.0-hotfix.1 — pre-release

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_PRIMARY: '22.x'
  APP_NAME: 'ceccoff-frontend'

permissions:
  contents:    read
  deployments: write

defaults:
  run:
    shell: bash

jobs:

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 1 — Setup                                                          ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  setup:
    name: 🏷️ Setup & Versão
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      version:   ${{ steps.version.outputs.tag }}
      sha_short: ${{ steps.version.outputs.sha }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🏷️ Detectar versão
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SHA="${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          {
            echo "### 🏷️ Versão: \`${TAG}\` — SHA: \`${SHA}\`"
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| Tag   | \`${TAG}\` |"
            echo "| SHA   | \`${SHA}\` |"
            echo "| Actor | @${{ github.actor }} |"
            echo "| Ref   | \`${{ github.ref }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2a — Lint & Type Check                                            ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 10

    steps:
      - name: 🔍 Lint & Type Check
        uses: ./.github/actions/ci-lint
        with:
          node-version: ${{ env.NODE_PRIMARY }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2b — Testes (Matrix Node 20 + 22)                                 ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  test:
    name: 🧪 Testes — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - name: 🧪 Testes unitários
        uses: ./.github/actions/ci-test
        with:
          node-version:            ${{ matrix.node-version }}
          upload-artifact:         ${{ matrix.node-version == '22.x' && 'true' || 'false' }}
          artifact-name:           coverage-report-${{ needs.setup.outputs.sha_short }}
          artifact-retention-days: '14'
          comment-pr:              'false'

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2c — Security Scan                                                ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 10

    steps:
      - name: 🔒 Security Audit
        uses: ./.github/actions/ci-security
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          audit-level:  'high'

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2d — Quality Gate                                                 ║
  # ║  Agrega lint + test (matrix) + security em um único job não-matrix.     ║
  # ║  Necessário porque reusable workflow callers não podem depender          ║
  # ║  diretamente de matrix jobs (limitação do GitHub Actions).               ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  quality-gate:
    name: ✅ Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    timeout-minutes: 5
    if: always()

    steps:
      - name: ✅ Verificar todos os checks de qualidade
        run: |
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          SEC="${{ needs.security.result }}"

          {
            echo "## ✅ Quality Gate"
            echo ""
            echo "| Check    | Status |"
            echo "|----------|--------|"
            echo "| 🔍 Lint     | ${LINT} |"
            echo "| 🧪 Testes   | ${TEST} |"
            echo "| 🔒 Security | ${SEC} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${LINT}" != "success" || "${TEST}" != "success" || "${SEC}" != "success" ]]; then
            echo "❌ Quality gate falhou — deploy bloqueado."
            exit 1
          fi
          echo "✅ Todos os checks passaram — liberando deploy."

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — Deploy DEV                                                    ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-dev:
    name: 🔵 Deploy → DEV
    needs: [setup, quality-gate]
    if: ${{ needs.quality-gate.result == 'success' }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment:        dev
      github-environment: 'DEV - Deploy'
      label:              DEV
      emoji:              '🔵'
      config:             development
      version:            ${{ needs.setup.outputs.version }}
      sha-short:          ${{ needs.setup.outputs.sha_short }}
      build-script:       build:dev
    secrets:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      API_URL:           ${{ secrets.DEV_API_URL }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — Deploy HML (paralelo ao DEV)                                  ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-hml:
    name: 🟡 Deploy → HML
    needs: [setup, quality-gate]
    if: ${{ needs.quality-gate.result == 'success' }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment:        hml
      github-environment: 'HML - Deploy'
      label:              HML
      emoji:              '🟡'
      config:             staging
      version:            ${{ needs.setup.outputs.version }}
      sha-short:          ${{ needs.setup.outputs.sha_short }}
      build-script:       build:staging
      strict-health:      'true'
      health-retries:     '10'
      health-wait:        '15'
    secrets:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      API_URL:           ${{ secrets.HML_API_URL }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_HML }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 4 — Deploy PRD                                                    ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-prd:
    name: 🔴 Deploy → PRD
    needs: [setup, deploy-hml]
    if: ${{ needs.deploy-hml.result == 'success' }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment:        prd
      github-environment: 'PRD - Deploy'
      label:              PRODUÇÃO
      emoji:              '🔴'
      config:             production
      version:            ${{ needs.setup.outputs.version }}
      sha-short:          ${{ needs.setup.outputs.sha_short }}
      build-script:       build:prod
      prod:               'true'
      strict-health:      'true'
      health-retries:     '10'
      health-wait:        '15'
    secrets:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      API_URL:           ${{ secrets.PRD_API_URL }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRD }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 5 — Release                                                       ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  release:
    name: 🎉 Release
    runs-on: ubuntu-latest
    needs: [setup, deploy-prd]
    if: ${{ needs.deploy-prd.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents:    write
      actions:     write
      deployments: write

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🎉 Criar GitHub Release
        uses: ./.github/actions/create-release
        with:
          version:      ${{ needs.setup.outputs.version }}
          github-token: ${{ github.token }}
          repo:         ${{ github.repository }}
          prerelease:   ${{ contains(needs.setup.outputs.version, '-') && 'true' || 'false' }}
          no-latest:    ${{ contains(needs.setup.outputs.version, '-') && 'true' || 'false' }}
          prd-url:      ${{ needs.deploy-prd.outputs.url }}

      - name: 📣 Notificar Slack — PRD Live
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          SHA="${{ needs.setup.outputs.sha_short }}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          # TODO: Ativar quando SLACK_WEBHOOK_URL estiver configurado
          echo "✅ [PLACEHOLDER] Slack #deployments: ${VERSION} live em PRD por @${ACTOR} às ${TIMESTAMP}"

      - name: 🧹 Rejeitar gates pendentes
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PAT_REJECT_TOKEN }}
          script: |
            const { data: pending } = await github.rest.actions.getPendingDeploymentsForRun({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              run_id: context.runId
            });

            if (pending.length === 0) {
              console.log('✅ Nenhum gate pendente — nada a rejeitar.');
              return;
            }

            const envIds   = pending.map(d => d.environment.id);
            const envNames = pending.map(d => d.environment.name).join(', ');

            try {
              await github.rest.actions.reviewPendingDeploymentsForRun({
                owner:           context.repo.owner,
                repo:            context.repo.repo,
                run_id:          context.runId,
                environment_ids: envIds,
                state:           'rejected',
                comment:         '🤖 Rejeitado automaticamente — release concluído com sucesso.'
              });
              console.log(`⏹️ Gates rejeitados: ${envNames}`);
            } catch (e) {
              if (e.status === 422) {
                console.log('ℹ️ Gates já resolvidos — nada a fazer.');
              } else {
                throw e;
              }
            }

      - name: 📊 Sumário — Pipeline Concluído
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          SHA="${{ needs.setup.outputs.sha_short }}"
          REPO="${{ github.repository }}"

          {
            echo "## 🎉 Release \`${VERSION}\` — Pipeline Concluído"
            echo ""
            echo "| Ambiente | Status |"
            echo "|----------|--------|"
            echo "| 🔵 DEV   | ✅ Deployado |"
            echo "| 🟡 HML   | ✅ Aprovado  |"
            echo "| 🔴 PRD   | ✅ Live      |"
            echo ""
            echo "| Item | Detalhe |"
            echo "|------|---------|"
            echo "| 🏷️ Versão  | \`${VERSION}\` |"
            echo "| 🔑 SHA     | \`${SHA}\` |"
            echo "| 📦 Release | [${VERSION}](https://github.com/${REPO}/releases/tag/${VERSION}) |"
            echo "| 👤 Por     | @${{ github.actor }} — $(date -u '+%Y-%m-%d %H:%M UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"
