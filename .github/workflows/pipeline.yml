# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║         🚀 PIPELINE CI/CD — CECCOFF FRONTEND (Angular 19 + Vercel)        ║
# ║                                                                              ║
# ║  Estratégia: Trunk-Based Development com Tags Semânticas                    ║
# ║  Build:      Separado por ambiente via angular.json fileReplacements        ║
# ║              environment.<env>.ts gerado em CI com secrets do GitHub        ║
# ║                                                                              ║
# ║  Stages:                                                                     ║
# ║    1 · setup     → detecta versão/SHA                                       ║
# ║    2 · lint          → ESLint + TypeScript type-check (feedback ~30s)      ║
# ║      · test          → matrix Node 18+20 (testes unitários + coverage)     ║
# ║      · security      → npm audit (paralelo)                                ║
# ║      · code-analysis → CodeQL SAST (paralelo)                              ║
# ║      · semgrep       → Semgrep rules TypeScript (paralelo)                 ║
# ║    3 · deploy-dev + deploy-hml (paralelos, gatados por todos do stage 2)   ║
# ║    4 · approve-prd   → único gate humano (HML OK → libera PRD)             ║
# ║    5 · deploy-prd    → deploy automático após aprovação                     ║
# ║    6 · release       → GitHub Release + Slack + cleanup (automático)        ║
# ║                                                                              ║
# ║  Composite Actions (.github/actions/):                                      ║
# ║    setup-deps            → node + npm ci + vercel CLI                      ║
# ║    generate-env-file     → gera environment.<env>.ts com secrets           ║
# ║    angular-build         → ng build + publica bundles no sumário           ║
# ║    vercel-build-output   → prepara .vercel/output/ (SPA prebuilt)          ║
# ║    vercel-deploy         → vercel deploy --prebuilt, retorna URL           ║
# ║    register-deployment   → GitHub Deployments API (rastreabilidade)        ║
# ║    health-check          → retry loop HTTP 200/401, modo strict            ║
# ║    snapshot-prev-version → última versão bem-sucedida por ambiente         ║
# ║    deploy-summary        → relatório de deploy no GITHUB_STEP_SUMMARY      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 🚀 Pipeline CI/CD

# ─────────────────────────────────────────────────────────────────────────────
# 🎯 TRIGGERS
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'    # v1.0.0, v2.3.1, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # v1.0.0-rc.1, v1.0.0-hotfix.1, etc.

  workflow_dispatch:
    inputs:
      skip_dev:
        description: '⏭️ Pular deploy em DEV'
        type: boolean
        default: false
        required: false
      skip_hml:
        description: '⏭️ Pular deploy em HML (PRD não será executado)'
        type: boolean
        default: false
        required: false
      force_version:
        description: '🏷️ Versão/Tag para forçar deploy (ex: v1.2.3). Padrão: tag atual'
        type: string
        required: false

# ─────────────────────────────────────────────────────────────────────────────
# 🔒 CONCORRÊNCIA — Evita deploys paralelos no mesmo ambiente
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# 🌍 VARIÁVEIS GLOBAIS
# ─────────────────────────────────────────────────────────────────────────────
env:
  NODE_PRIMARY: '20.x'
  APP_NAME: 'ceccoff-frontend'

# ══════════════════════════════════════════════════════════════════════════════
# 📋 JOBS
# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 1 — Setup                                                          ║
  # ║  Detecta versão e SHA. Jobs downstream consomem esses outputs.           ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  setup:
    name: 🏷️ Setup & Versão
    runs-on: ubuntu-latest

    outputs:
      version:   ${{ steps.version.outputs.tag }}
      sha_short: ${{ steps.version.outputs.sha }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Detectar versão
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.force_version }}" ]]; then
            TAG="${{ inputs.force_version }}"
          else
            TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0-dev')"
          fi
          SHA="${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "### 🏷️ Versão: \`${TAG}\` — SHA: \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "| Campo | Valor |"                             >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|"                             >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag   | \`${TAG}\` |"                       >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA   | \`${SHA}\` |"                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Actor | @${{ github.actor }} |"             >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref   | \`${{ github.ref }}\` |"           >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2a — Lint & Type Check                                            ║
  # ║  Feedback rápido (~30s). Falha imediata sem aguardar testes mais lentos. ║
  # ║  Roda: ESLint (ng lint) + verificação TypeScript (tsc --noEmit).        ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    needs: [setup]

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_PRIMARY }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      - name: 🔍 ESLint
        id: eslint
        run: npm run lint

      - name: 🏷️ TypeScript — type check (sem emitir arquivos)
        id: typecheck
        run: npx tsc --noEmit

      - name: 📊 Sumário — Lint & Type Check
        if: always()
        run: |
          echo "## 🔍 Lint & Type Check"                                                    >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                             >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |"                                                          >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|"                                                          >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 ESLint     | $([[ '${{ steps.eslint.outcome }}'    == 'success' ]] && echo '✅ Passou' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ TypeScript | $([[ '${{ steps.typecheck.outcome }}' == 'success' ]] && echo '✅ Passou' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2b — Testes (Matrix Node 18 + 20)                                 ║
  # ║  Foco exclusivo em testes unitários + cobertura.                         ║
  # ║  Lint foi extraído para job dedicado (feedback mais rápido).             ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  test:
    name: 🧪 Testes — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    needs: [setup]

    strategy:
      fail-fast: true   # cancela o par se um falhar
      matrix:
        node-version: ['18.x', '20.x']

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      - name: 🧪 Testes unitários
        id: tests
        run: npm run test:ci

      - name: 📈 Publicar cobertura no sumário
        if: matrix.node-version == '20.x' && always()
        run: |
          SUMMARY_FILE="coverage/coverage-summary.json"
          if [[ -f "$SUMMARY_FILE" ]]; then
            STMTS=$(jq '.total.statements.pct' "$SUMMARY_FILE")
            BRANCH=$(jq '.total.branches.pct'  "$SUMMARY_FILE")
            FUNCS=$(jq  '.total.functions.pct'  "$SUMMARY_FILE")
            LINES=$(jq  '.total.lines.pct'      "$SUMMARY_FILE")
            echo "## 📈 Coverage Report (Node ${{ matrix.node-version }})" >> "$GITHUB_STEP_SUMMARY"
            echo ""                                                          >> "$GITHUB_STEP_SUMMARY"
            echo "| Métrica    | Cobertura |"                               >> "$GITHUB_STEP_SUMMARY"
            echo "|------------|-----------|"                               >> "$GITHUB_STEP_SUMMARY"
            echo "| Statements | ${STMTS}% |"                              >> "$GITHUB_STEP_SUMMARY"
            echo "| Branches   | ${BRANCH}% |"                             >> "$GITHUB_STEP_SUMMARY"
            echo "| Functions  | ${FUNCS}% |"                              >> "$GITHUB_STEP_SUMMARY"
            echo "| Lines      | ${LINES}% |"                              >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ coverage-summary.json não encontrado."                >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📦 Upload relatório de coverage
        if: matrix.node-version == '20.x' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ needs.setup.outputs.sha_short }}
          path: coverage/
          retention-days: 14

      - name: 📊 Sumário — Testes Node ${{ matrix.node-version }}
        if: always()
        run: |
          echo "## 🧪 Testes — Node ${{ matrix.node-version }}"              >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                              >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Status |"                                            >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|"                                            >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão | \`${{ needs.setup.outputs.version }}\` |"      >> "$GITHUB_STEP_SUMMARY"
          echo "| 🧪 Testes | $([[ '${{ steps.tests.outcome }}' == 'success' ]] && echo '✅ Passou' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2b — CodeQL Analysis (paralelo ao test)                           ║
  # ║  SAST nativo do GitHub. 100% open-source, zero infraestrutura.           ║
  # ║  Resultados aparecem em Security → Code scanning alerts do repositório.  ║
  # ║  Detecta: injeção, XSS, path traversal, race conditions, etc.            ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  code-analysis:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    needs: [setup]
    permissions:
      actions:         read
      contents:        read
      security-events: write  # necessário para upload de resultados SARIF

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🔬 Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # security-extended: regras adicionais de segurança além do padrão
          # security-and-quality: inclui qualidade de código
          queries: security-extended,security-and-quality

      - name: 🔬 Executar análise CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

      - name: 📊 Sumário — CodeQL
        if: always()
        run: |
          echo "## 🔬 CodeQL Analysis"                                              >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                    >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Detalhe |"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão    | \`${{ needs.setup.outputs.version }}\` |"          >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Linguagem | TypeScript / JavaScript |"                         >> "$GITHUB_STEP_SUMMARY"
          echo "| 📋 Queries   | security-extended + security-and-quality |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| 📍 Resultados | Security → Code scanning alerts |"               >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2c — Semgrep (paralelo ao test e ao CodeQL)                       ║
  # ║  Rules-based SAST com regras da comunidade para TypeScript/Angular.      ║
  # ║  Open-source, roda localmente, zero conta necessária.                    ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  semgrep:
    name: 🔍 Semgrep
    runs-on: ubuntu-latest
    needs: [setup]
    container:
      image: semgrep/semgrep

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🔍 Semgrep — TypeScript + Security + Angular
        id: scan
        run: |
          semgrep scan \
            --config "p/typescript" \
            --config "p/javascript" \
            --config "p/security-audit" \
            --config "p/owasp-top-ten" \
            --error \
            --json-output=semgrep-results.json \
            src/ 2>&1 | tee semgrep-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: 📊 Sumário — Semgrep
        if: always()
        run: |
          FINDINGS=$(jq '.results | length' semgrep-results.json 2>/dev/null || echo "0")
          ERRORS=$(jq '.errors | length' semgrep-results.json 2>/dev/null || echo "0")
          STATUS=$([[ "${FINDINGS}" == "0" ]] && echo "✅ Nenhum finding" || echo "⚠️ ${FINDINGS} finding(s) encontrado(s)")

          echo "## 🔍 Semgrep"                                                      >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                    >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Detalhe |"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão   | \`${{ needs.setup.outputs.version }}\` |"           >> "$GITHUB_STEP_SUMMARY"
          echo "| 📋 Regras   | typescript · javascript · security-audit · owasp |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Findings | ${STATUS} |"                                        >> "$GITHUB_STEP_SUMMARY"

          if [[ -f semgrep-results.json && "${FINDINGS}" != "0" ]]; then
            echo ""                                                                  >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>📋 Findings detalhados</summary>"              >> "$GITHUB_STEP_SUMMARY"
            echo ""                                                                  >> "$GITHUB_STEP_SUMMARY"
            echo '```json'                                                          >> "$GITHUB_STEP_SUMMARY"
            jq '[.results[] | {file: .path, rule: .check_id, line: .start.line, message: .extra.message}]' \
              semgrep-results.json 2>/dev/null | head -100                          >> "$GITHUB_STEP_SUMMARY"
            echo '```'                                                              >> "$GITHUB_STEP_SUMMARY"
            echo "</details>"                                                       >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: ❌ Falhar se findings críticos encontrados
        if: steps.scan.outputs.exit_code != '0'
        run: |
          echo "❌ Semgrep encontrou issues — revise os findings acima."
          exit 1

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 2d — Security Scan (paralelo a todos acima)                       ║
  # ║  Auditoria de dependências. Falha em vulnerabilidades HIGH ou CRITICAL.  ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [setup]

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_PRIMARY }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_PRIMARY }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      - name: 🔒 npm audit — dependências de produção
        id: audit
        run: |
          # --omit=dev: exclui devDependencies (ferramentas de build, etc.)
          # --audit-level=high: falha em HIGH e CRITICAL
          # Ajuste para 'critical' se quiser ser menos restritivo inicialmente
          npm audit --audit-level=high --omit=dev 2>&1 | tee audit-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          if [[ ${EXIT_CODE} -eq 0 ]]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi
          exit ${EXIT_CODE}

      - name: 📊 Sumário — Security Scan
        if: always()
        run: |
          STATUS="${{ steps.audit.outputs.status }}"
          ICON=$([[ "${STATUS}" == "passed" ]] && echo "✅ Nenhuma vulnerabilidade HIGH/CRITICAL" || echo "❌ Vulnerabilidades encontradas — ver log")

          echo "## 🔒 Security Scan"                                           >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Detalhe |"                                            >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|"                                            >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão | \`${{ needs.setup.outputs.version }}\` |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Escopo | Dependências de produção (\`--omit=dev\`) |"    >> "$GITHUB_STEP_SUMMARY"
          echo "| 📊 Nível  | HIGH + CRITICAL |"                              >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔒 Status | ${ICON} |"                                      >> "$GITHUB_STEP_SUMMARY"

          if [[ -f audit-output.txt ]]; then
            echo ""                                                             >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>📋 Output completo do npm audit</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo ""                                                             >> "$GITHUB_STEP_SUMMARY"
            echo '```'                                                         >> "$GITHUB_STEP_SUMMARY"
            head -50 audit-output.txt                                          >> "$GITHUB_STEP_SUMMARY"
            echo '```'                                                         >> "$GITHUB_STEP_SUMMARY"
            echo "</details>"                                                  >> "$GITHUB_STEP_SUMMARY"
          fi

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — Deploy DEV                                                    ║
  # ║  Só executa após lint + test + security + code-analysis + semgrep.     ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-dev:
    name: 🔵 Deploy → DEV
    runs-on: ubuntu-latest
    needs: [setup, lint, test, security, code-analysis, semgrep]
    if: ${{ inputs.skip_dev != true }}
    permissions:
      deployments: write
      contents:    read

    outputs:
      version: ${{ needs.setup.outputs.version }}
      url:     ${{ steps.deploy.outputs.url }}

    environment:
      name: DEV - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node + npm ci + Vercel CLI
        uses: ./.github/actions/setup-deps
        with:
          node-version: ${{ env.NODE_PRIMARY }}

      - name: 🔧 Gerar environment.ts — DEV
        uses: ./.github/actions/generate-env-file
        with:
          environment: dev
          api-url:     ${{ secrets.DEV_API_URL }}
          version:     ${{ needs.setup.outputs.version }}

      - name: 🏗️ Build Angular — DEV
        id: build
        uses: ./.github/actions/angular-build
        with:
          script: build:dev
          label:  DEV

      - name: 🗂️ Preparar Vercel Build Output (SPA prebuilt)
        uses: ./.github/actions/vercel-build-output
        with:
          app-name: ${{ env.APP_NAME }}

      - name: 🔵 Vercel Deploy — DEV
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token:       ${{ secrets.VERCEL_TOKEN }}
          org-id:      ${{ secrets.VERCEL_ORG_ID }}
          project-id:  ${{ secrets.VERCEL_PROJECT_ID_DEV }}
          environment: dev
          version:     ${{ needs.setup.outputs.version }}
          sha-short:   ${{ needs.setup.outputs.sha_short }}

      - name: 💾 Registrar deployment no GitHub Deployments API
        uses: ./.github/actions/register-deployment
        with:
          environment: dev
          version:     ${{ needs.setup.outputs.version }}
          url:         ${{ steps.deploy.outputs.url }}

      - name: 🏥 Health Check — DEV
        id: health
        uses: ./.github/actions/health-check
        with:
          url: ${{ steps.deploy.outputs.url }}

      - name: 📊 Sumário — Deploy DEV
        if: always()
        uses: ./.github/actions/deploy-summary
        with:
          environment:   dev
          label:         DEV
          emoji:         🔵
          config:        development
          version:       ${{ needs.setup.outputs.version }}
          sha-short:     ${{ needs.setup.outputs.sha_short }}
          url:           ${{ steps.deploy.outputs.url }}
          build-outcome: ${{ steps.build.outcome }}
          health-status: ${{ steps.health.outputs.status }}
          actor:         ${{ github.actor }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 3 — Deploy HML (paralelo ao DEV)                                  ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-hml:
    name: 🟡 Deploy → HML
    runs-on: ubuntu-latest
    needs: [setup, lint, test, security, code-analysis, semgrep]
    if: ${{ inputs.skip_hml != true }}
    permissions:
      deployments: write
      contents:    read

    outputs:
      version:      ${{ needs.setup.outputs.version }}
      sha_short:    ${{ needs.setup.outputs.sha_short }}
      url:          ${{ steps.deploy.outputs.url }}
      prev_version: ${{ steps.snapshot.outputs.prev_version }}

    environment:
      name: HML - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node + npm ci + Vercel CLI
        uses: ./.github/actions/setup-deps
        with:
          node-version: ${{ env.NODE_PRIMARY }}

      - name: 💾 Snapshot versão anterior — HML
        id: snapshot
        uses: ./.github/actions/snapshot-prev-version
        with:
          environment: hml

      - name: 🔧 Gerar environment.ts — HML
        uses: ./.github/actions/generate-env-file
        with:
          environment: hml
          api-url:     ${{ secrets.HML_API_URL }}
          version:     ${{ needs.setup.outputs.version }}

      - name: 🏗️ Build Angular — HML
        id: build
        uses: ./.github/actions/angular-build
        with:
          script: build:staging
          label:  HML

      - name: 🗂️ Preparar Vercel Build Output (SPA prebuilt)
        uses: ./.github/actions/vercel-build-output
        with:
          app-name: ${{ env.APP_NAME }}

      - name: 🟡 Vercel Deploy — HML
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token:        ${{ secrets.VERCEL_TOKEN }}
          org-id:       ${{ secrets.VERCEL_ORG_ID }}
          project-id:   ${{ secrets.VERCEL_PROJECT_ID_HML }}
          environment:  hml
          version:      ${{ needs.setup.outputs.version }}
          sha-short:    ${{ needs.setup.outputs.sha_short }}
          prev-version: ${{ steps.snapshot.outputs.prev_version }}

      - name: 💾 Registrar deployment no GitHub Deployments API
        uses: ./.github/actions/register-deployment
        with:
          environment: hml
          version:     ${{ needs.setup.outputs.version }}
          url:         ${{ steps.deploy.outputs.url }}

      - name: 🏥 Health Check — HML
        id: health
        uses: ./.github/actions/health-check
        with:
          url:     ${{ steps.deploy.outputs.url }}
          retries: '10'
          wait:    '15'
          timeout: '15'
          strict:  'true'

      - name: 📊 Sumário — Deploy HML
        if: always()
        uses: ./.github/actions/deploy-summary
        with:
          environment:   hml
          label:         HML
          emoji:         🟡
          config:        staging
          version:       ${{ needs.setup.outputs.version }}
          sha-short:     ${{ needs.setup.outputs.sha_short }}
          url:           ${{ steps.deploy.outputs.url }}
          prev-version:  ${{ steps.snapshot.outputs.prev_version }}
          build-outcome: ${{ steps.build.outcome }}
          health-status: ${{ steps.health.outputs.status }}
          actor:         ${{ github.actor }}


  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 4 — Aprovação → PRD (único gate humano do pipeline)               ║
  # ║  Revisor confirma que HML está OK. Aprovação dispara deploy-prd.          ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  verify-hml:
    name: 🚀 Aprovação → PRD
    runs-on: ubuntu-latest
    needs: [deploy-hml]
    if: ${{ needs.deploy-hml.result == 'success' }}

    # Propaga version/sha_short para deploy-prd eliminar aresta visual ci→prd
    outputs:
      version:   ${{ needs.deploy-hml.outputs.version }}
      sha_short: ${{ needs.deploy-hml.outputs.sha_short }}

    environment:
      name: HML - Liberar PRD

    steps:
      - name: 🔍 Aguardando aprovação da equipe
        run: |
          VERSION="${{ needs.deploy-hml.outputs.version }}"
          URL="${{ needs.deploy-hml.outputs.url }}"

          echo "## 🚀 Gate de Aprovação — PRD"                                              >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                             >> "$GITHUB_STEP_SUMMARY"
          echo "Versão **\`${VERSION}\`** validada em HML e aguardando aprovação para PRD." >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                             >> "$GITHUB_STEP_SUMMARY"
          echo "| Ação | Resultado |"                                                        >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-----------|"                                                        >> "$GITHUB_STEP_SUMMARY"
          echo "| ✅ **APROVAR**  | Dispara deploy em PRD automaticamente |"                >> "$GITHUB_STEP_SUMMARY"
          echo "| ❌ **REJEITAR** | Pipeline encerra — execute **↩️ Rollback** → \`hml\` se necessário |" >> "$GITHUB_STEP_SUMMARY"

      - name: ✅ HML aprovada — liberando PRD
        run: |
          echo "🚀 PRD liberado por @${{ github.actor }} em $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 5 — Deploy PRD                                                    ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  deploy-prd:
    name: 🔴 Deploy → PRD
    runs-on: ubuntu-latest
    needs: [verify-hml]
    if: ${{ needs.verify-hml.result == 'success' }}
    permissions:
      deployments: write
      contents:    read

    outputs:
      version:      ${{ needs.verify-hml.outputs.version }}
      sha_short:    ${{ needs.verify-hml.outputs.sha_short }}
      url:          ${{ steps.deploy.outputs.url }}
      prev_version: ${{ steps.snapshot.outputs.prev_version }}
      prev_url:     ${{ steps.snapshot.outputs.prev_url }}

    environment:
      name: PRD - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node + npm ci + Vercel CLI
        uses: ./.github/actions/setup-deps
        with:
          node-version: ${{ env.NODE_PRIMARY }}

      - name: 💾 Snapshot versão anterior — PRD
        id: snapshot
        uses: ./.github/actions/snapshot-prev-version
        with:
          environment: prd

      - name: 🔧 Gerar environment.ts — PRD
        uses: ./.github/actions/generate-env-file
        with:
          environment: prd
          api-url:     ${{ secrets.PRD_API_URL }}
          version:     ${{ needs.verify-hml.outputs.version }}

      - name: 🏗️ Build Angular — PRD
        id: build
        uses: ./.github/actions/angular-build
        with:
          script: build:prod
          label:  PRD

      - name: 🗂️ Preparar Vercel Build Output (SPA prebuilt)
        uses: ./.github/actions/vercel-build-output
        with:
          app-name: ${{ env.APP_NAME }}

      - name: 🔴 Vercel Deploy — PRD
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token:        ${{ secrets.VERCEL_TOKEN }}
          org-id:       ${{ secrets.VERCEL_ORG_ID }}
          project-id:   ${{ secrets.VERCEL_PROJECT_ID_PRD }}
          environment:  prd
          version:      ${{ needs.verify-hml.outputs.version }}
          sha-short:    ${{ needs.verify-hml.outputs.sha_short }}
          prev-version: ${{ steps.snapshot.outputs.prev_version }}
          prod:         'true'

      - name: 💾 Registrar deployment no GitHub Deployments API
        uses: ./.github/actions/register-deployment
        with:
          environment: prd
          version:     ${{ needs.verify-hml.outputs.version }}
          url:         ${{ steps.deploy.outputs.url }}

      - name: 🏥 Health Check — PRD
        id: health
        uses: ./.github/actions/health-check
        with:
          url:     ${{ steps.deploy.outputs.url }}
          retries: '10'
          wait:    '15'
          timeout: '15'
          strict:  'true'

      - name: 📊 Sumário — Deploy PRD
        if: always()
        uses: ./.github/actions/deploy-summary
        with:
          environment:   prd
          label:         PRODUÇÃO
          emoji:         🔴
          config:        production
          version:       ${{ needs.verify-hml.outputs.version }}
          sha-short:     ${{ needs.verify-hml.outputs.sha_short }}
          url:           ${{ steps.deploy.outputs.url }}
          prev-version:  ${{ steps.snapshot.outputs.prev_version }}
          build-outcome: ${{ steps.build.outcome }}
          health-status: ${{ steps.health.outputs.status }}
          actor:         ${{ github.actor }}

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  STAGE 6 — Release (automático)                                          ║
  # ║  Sem gate humano. Executa assim que PRD está live:                        ║
  # ║    · GitHub Release com changelog gerado automaticamente (--generate-notes)║
  # ║    · Notificação Slack #deployments                                       ║
  # ║    · Limpeza de gates pendentes via PAT_REJECT_TOKEN                     ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  release:
    name: 🎉 Release
    runs-on: ubuntu-latest
    needs: [deploy-prd]
    if: ${{ needs.deploy-prd.result == 'success' }}
    permissions:
      contents:    write  # criar GitHub Release
      actions:     write  # rejeitar gates pendentes
      deployments: write

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Criar GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.deploy-prd.outputs.version }}"

          # Pré-release se tiver sufixo semântico (ex: v1.0.0-rc.1, v1.0.0-hotfix.1)
          PRERELEASE_FLAG=""
          [[ "${VERSION}" == *"-"* ]] && PRERELEASE_FLAG="--prerelease"

          # --generate-notes: changelog automático a partir dos PRs desde a tag anterior
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            ${PRERELEASE_FLAG} \
            --latest \
            2>/dev/null \
            || echo "ℹ️ Release ${VERSION} já existe — ignorando."

      - name: 📣 Notificar Slack — PRD Live
        run: |
          VERSION="${{ needs.deploy-prd.outputs.version }}"
          SHA="${{ needs.deploy-prd.outputs.sha_short }}"
          URL="${{ needs.deploy-prd.outputs.url }}"
          ACTOR="${{ github.actor }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          REPO="${{ github.repository }}"

          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{
          #     \"text\": \"✅ *CECCOFF \`${VERSION}\`* está live em produção\",
          #     \"attachments\": [{
          #       \"color\": \"#36a64f\",
          #       \"fields\": [
          #         { \"title\": \"Versão\", \"value\": \"${VERSION}\", \"short\": true },
          #         { \"title\": \"URL\",    \"value\": \"${URL}\",     \"short\": true },
          #         { \"title\": \"SHA\",    \"value\": \"${SHA}\",     \"short\": true },
          #         { \"title\": \"Por\",    \"value\": \"@${ACTOR}\",  \"short\": true }
          #       ],
          #       \"footer\": \"<https://github.com/${REPO}/releases/tag/${VERSION}|Ver Release Notes>\"
          #     }]
          #   }"

          echo "✅ [FAKE] Slack #deployments: ${VERSION} live em PRD por @${ACTOR} às ${TIMESTAMP}"

      - name: 🧹 Rejeitar gates pendentes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_REJECT_TOKEN }}
          script: |
            const { data: pending } = await github.rest.actions.getPendingDeploymentsForRun({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              run_id: context.runId
            });

            if (pending.length === 0) {
              console.log('✅ Nenhum gate pendente — nada a rejeitar.');
              return;
            }

            const envIds   = pending.map(d => d.environment.id);
            const envNames = pending.map(d => d.environment.name).join(', ');

            try {
              await github.rest.actions.reviewPendingDeploymentsForRun({
                owner:           context.repo.owner,
                repo:            context.repo.repo,
                run_id:          context.runId,
                environment_ids: envIds,
                state:           'rejected',
                comment:         '🤖 Rejeitado automaticamente — release concluído com sucesso.'
              });
              console.log(`⏹️ Gates rejeitados: ${envNames}`);
            } catch (e) {
              if (e.status === 422) {
                console.log('ℹ️ Gates já resolvidos — nada a fazer.');
              } else {
                throw e;
              }
            }

      - name: 📊 Sumário — Release
        run: |
          VERSION="${{ needs.deploy-prd.outputs.version }}"
          SHA="${{ needs.deploy-prd.outputs.sha_short }}"
          URL="${{ needs.deploy-prd.outputs.url }}"
          REPO="${{ github.repository }}"

          echo "## 🎉 Release \`${VERSION}\` — Concluído"                                                    >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "| Ambiente | Status |"                                                                         >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|"                                                                         >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔵 DEV   | ✅ Deployado |"                                                                   >> "$GITHUB_STEP_SUMMARY"
          echo "| 🟡 HML   | ✅ Aprovado  |"                                                                   >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 PRD   | ✅ Live      |"                                                                   >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Detalhe |"                                                                            >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|"                                                                            >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏷️ Versão  | \`${VERSION}\` |"                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔑 SHA     | \`${SHA}\` |"                                                                   >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 URL     | ${URL} |"                                                                       >> "$GITHUB_STEP_SUMMARY"
          echo "| 📦 Release | [${VERSION}](https://github.com/${REPO}/releases/tag/${VERSION}) |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Por     | @${{ github.actor }} — $(date -u '+%Y-%m-%d %H:%M UTC') |"                     >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "> 📣 Slack notificado. GitHub Release criado automaticamente com changelog."                  >> "$GITHUB_STEP_SUMMARY"
