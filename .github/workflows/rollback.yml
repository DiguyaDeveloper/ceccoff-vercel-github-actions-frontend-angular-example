# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║           ↩️ ROLLBACK — CECCOFF FRONTEND (React + Vite)                   ║
# ║                                                                              ║
# ║  Detecta automaticamente a versão anterior via GitHub Deployments API       ║
# ║  Rebuilda com as variáveis do ambiente correto (VITE_* baked in)           ║
# ║  Suporta: HML e PRD                                                         ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: ↩️ Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '🌍 Ambiente para rollback'
        type: choice
        required: true
        options:
          - dev
          - hml
          - prd

      strategy:
        description: '♻️ Estratégia de rollback'
        type: choice
        required: true
        options:
          - 'automatico'      # Detecta e usa a versão anterior via GitHub Deployments API ← recomendado
          - 'tag-especifica'  # Especifique a tag manualmente abaixo

      target_tag:
        description: '🏷️ Tag Git alvo (ex: v1.2.3) — somente para estratégia "tag-especifica"'
        type: string
        required: false

      reason:
        description: '📝 Motivo do rollback (obrigatório para rastreabilidade)'
        type: string
        required: true

concurrency:
  group: rollback-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20.x'
  APP_NAME: 'ceccoff-frontend'

jobs:

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔍 DETECTAR — Resolve a versão a ser restaurada                         ║
  # ║                                                                            ║
  # ║  Modo "automatico": consulta GitHub Deployments API e encontra a última  ║
  # ║  versão com sucesso ANTES da atual para o ambiente selecionado.           ║
  # ║                                                                            ║
  # ║  Exemplo real:                                                             ║
  # ║    PRD tem: v1.3.0 (atual), v1.2.1 (anterior), v1.1.0                   ║
  # ║    Rollback automático → v1.2.1 (não v1.2.1 do repo, mas o que estava   ║
  # ║    realmente deployado em PRD antes de v1.3.0)                           ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  detect-version:
    name: 🔍 Detectar Versão para Rollback
    runs-on: ubuntu-latest

    outputs:
      target_version: ${{ steps.resolve.outputs.target_version }}
      current_version: ${{ steps.resolve.outputs.current_version }}
      target_url: ${{ steps.resolve.outputs.target_url }}
      can_rollback: ${{ steps.resolve.outputs.can_rollback }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Resolver versão via GitHub Deployments API
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ inputs.environment }}';
            const strategy = '${{ inputs.strategy }}';
            const manualTag = '${{ inputs.target_tag }}';

            // Busca deployments do ambiente, ordenados do mais recente ao mais antigo
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: env,
              per_page: 20
            }).catch(() => ({ data: [] }));

            // Filtra apenas deployments com status 'success'
            const successful = [];
            for (const dep of deployments.data) {
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: dep.id,
                per_page: 1
              }).catch(() => ({ data: [] }));

              const latestStatus = statuses.data[0];
              if (latestStatus?.state === 'success') {
                successful.push({
                  version: dep.description?.replace('Version: ', '') || dep.ref,
                  url: latestStatus.environment_url || '',
                  deployed_at: dep.created_at,
                  id: dep.id
                });
              }
            }

            console.log(`Deployments bem-sucedidos em ${env}:`, JSON.stringify(successful, null, 2));

            if (successful.length === 0) {
              core.setFailed(`❌ Nenhum deployment bem-sucedido encontrado em ${env}`);
              return;
            }

            // Versão atual = a mais recente com sucesso
            const currentVersion = successful[0].version;
            core.setOutput('current_version', currentVersion);

            if (strategy === 'automatico') {
              if (successful.length < 2) {
                core.setFailed(`❌ Não há versão anterior em ${env}. Apenas 1 deployment encontrado: ${currentVersion}`);
                return;
              }
              // Versão anterior = segunda mais recente com sucesso
              const prev = successful[1];
              core.setOutput('target_version', prev.version);
              core.setOutput('target_url', prev.url);
              core.setOutput('can_rollback', 'true');
              console.log(`✅ Rollback automático: ${currentVersion} → ${prev.version}`);

            } else {
              // tag-especifica: valida que a tag informada existe
              if (!manualTag) {
                core.setFailed('❌ "target_tag" é obrigatório para estratégia "tag-especifica"');
                return;
              }
              const { execSync } = require('child_process');
              try {
                execSync(`git rev-parse ${manualTag}`, { stdio: 'pipe' });
              } catch {
                core.setFailed(`❌ Tag "${manualTag}" não encontrada no repositório`);
                return;
              }
              core.setOutput('target_version', manualTag);
              core.setOutput('target_url', '');
              core.setOutput('can_rollback', 'true');
              console.log(`✅ Rollback para tag específica: ${currentVersion} → ${manualTag}`);
            }

      - name: 📊 Sumário — Detecção
        run: |
          echo "## 🔍 Detecção de Versão para Rollback"                                   >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Item               | Detalhe                                           |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------------|---------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌍 Ambiente        | **${{ inputs.environment }}**                     |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ♻️ Estratégia      | \`${{ inputs.strategy }}\`                       |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Versão atual    | \`${{ steps.resolve.outputs.current_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🎯 Versão alvo     | \`${{ steps.resolve.outputs.target_version }}\`  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📝 Motivo          | ${{ inputs.reason }}                              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Solicitado por  | @${{ github.actor }}                              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Iniciado em     | $(date -u '+%Y-%m-%d %H:%M:%S UTC')               |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "> Aguardando aprovação para executar o rollback..."                         >> "$GITHUB_STEP_SUMMARY"


  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔐 APROVAÇÃO — Gate de segurança                                        ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  approve-rollback:
    name: 🔐 Aprovar Rollback — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [detect-version]
    if: ${{ needs.detect-version.outputs.can_rollback == 'true' }}

    environment:
      name: rollback-${{ inputs.environment }}

    steps:
      - name: 🔐 Rollback autorizado — executando
        run: |
          echo "## 🔐 Rollback Autorizado"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Item               | Detalhe                                           |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------------|---------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌍 Ambiente        | **${{ inputs.environment }}**                     |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Revertendo de   | \`${{ needs.detect-version.outputs.current_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🎯 Restaurando para| \`${{ needs.detect-version.outputs.target_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Autorizado por  | @${{ github.actor }}                              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Autorizado em   | $(date -u '+%Y-%m-%d %H:%M:%S UTC')               |" >> "$GITHUB_STEP_SUMMARY"


  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔵 ROLLBACK DEV                                                         ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  rollback-dev:
    name: ↩️ Rollback → DEV
    runs-on: ubuntu-latest
    needs: [detect-version, approve-rollback]
    if: ${{ inputs.environment == 'dev' && needs.approve-rollback.result == 'success' }}
    permissions:
      deployments: write
      contents: read

    environment:
      name: dev
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout versão alvo (${{ needs.detect-version.outputs.target_version }})
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-version.outputs.target_version }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      - name: 🔧 Gerar environment.development.ts — DEV (rollback)
        run: |
          cat > src/environments/environment.development.ts << 'EOF'
          export const environment = {
            name:       'development',
            production: false,
            apiUrl:     '${{ secrets.DEV_API_URL }}',
            version:    '${{ needs.detect-version.outputs.target_version }}',
          };
          EOF
          echo "✅ environment.development.ts gerado (rollback)"

      - name: 🏗️ Build Angular versão ${{ needs.detect-version.outputs.target_version }} — DEV
        id: build
        run: npm run build:dev

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🗂️ Criar estrutura Vercel Build Output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/ceccoff-frontend/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'VCEOF'
          {
            "version": 3,
            "routes": [
              {"src":"/assets/(.*)","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.js","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.css","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/index\\.html","headers":{"cache-control":"no-cache, no-store, must-revalidate"},"continue":true},
              {"handle":"filesystem"},
              {"src":"/(.*)","dest":"/index.html"}
            ]
          }
          VCEOF

      - name: ↩️ Deploy rollback em DEV
        id: deploy
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt \
            --token="$VERCEL_TOKEN" \
            --yes \
            --meta version="${{ needs.detect-version.outputs.target_version }}" \
            --meta environment=dev \
            --meta rollback=true \
            --meta rollback_from="${{ needs.detect-version.outputs.current_version }}" \
            --meta rollback_reason="${{ inputs.reason }}" \
            2>/dev/null)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "❌ Vercel não retornou URL."
            vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes 2>&1 || true
            exit 1
          fi
          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Rollback DEV deployado: ${DEPLOY_URL}"

      - name: 💾 Registrar rollback no histórico de DEV
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.detect-version.outputs.target_version }}',
              environment: 'dev',
              description: 'Version: ${{ needs.detect-version.outputs.target_version }}',
              auto_merge: false,
              required_contexts: []
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Rollback from ${{ needs.detect-version.outputs.current_version }}'
            });

      - name: 🏥 Health Check pós-rollback DEV
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS="unhealthy"
          for i in {1..6}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${URL}" || echo "000")
            if [[ "${HTTP_CODE}" == "200" || "${HTTP_CODE}" == "401" ]]; then
              STATUS="healthy"
              [[ "${HTTP_CODE}" == "401" ]] && echo "ℹ️ HTTP 401 — preview protegido por Vercel Auth"
              break
            fi
            echo "⏳ Tentativa ${i}/6 — HTTP ${HTTP_CODE}"; sleep 10
          done
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: 📊 Sumário — Rollback DEV
        if: always()
        run: |
          RESULT="${{ job.status }}"
          ICON=$([[ "${RESULT}" == "success" ]] && echo "✅" || echo "❌")
          echo "## ${ICON} Relatório Rollback — DEV"                                         >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                             >> "$GITHUB_STEP_SUMMARY"
          echo "| Item                | Detalhe                                            |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------------------|----------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ♻️ Revertido de     | \`${{ needs.detect-version.outputs.current_version }}\` → \`${{ needs.detect-version.outputs.target_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 URL              | ${{ steps.deploy.outputs.url }}                    |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build            | $([[ '${{ steps.build.outcome }}' == 'success' ]] && echo '✅ Gerado' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏥 Health Check     | $([[ '${{ steps.health.outputs.status }}' == 'healthy' ]] && echo '✅ Saudável' || echo '❌ Verificar') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📝 Motivo           | ${{ inputs.reason }}                               |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Executado por    | @${{ github.actor }}                               |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Executado em     | $(date -u '+%Y-%m-%d %H:%M:%S UTC')                |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏁 Resultado        | ${ICON} ${RESULT}                                  |" >> "$GITHUB_STEP_SUMMARY"


  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🟡 ROLLBACK HML                                                         ║
  # ║                                                                            ║
  # ║  Rebuilda com as variáveis de HML (VITE_ENV=staging, etc.)               ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  rollback-hml:
    name: ↩️ Rollback → HML
    runs-on: ubuntu-latest
    needs: [detect-version, approve-rollback]
    if: ${{ inputs.environment == 'hml' && needs.approve-rollback.result == 'success' }}
    permissions:
      deployments: write
      contents: read

    environment:
      name: hml
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout versão alvo (${{ needs.detect-version.outputs.target_version }})
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-version.outputs.target_version }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      # ── Gera environment.staging.ts com os secrets corretos ──────────────────
      - name: 🔧 Gerar environment.staging.ts — HML (rollback)
        run: |
          cat > src/environments/environment.staging.ts << 'EOF'
          export const environment = {
            name:       'staging',
            production: false,
            apiUrl:     '${{ secrets.HML_API_URL }}',
            version:    '${{ needs.detect-version.outputs.target_version }}',
          };
          EOF
          echo "✅ environment.staging.ts gerado (rollback)"

      - name: 🏗️ Build Angular versão ${{ needs.detect-version.outputs.target_version }} — HML
        id: build
        run: |
          npm run build:staging
          echo "✅ Build rollback HML gerado"

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🗂️ Criar estrutura Vercel Build Output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/ceccoff-frontend/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'VCEOF'
          {
            "version": 3,
            "routes": [
              {"src":"/assets/(.*)","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.js","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.css","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/index\\.html","headers":{"cache-control":"no-cache, no-store, must-revalidate"},"continue":true},
              {"handle":"filesystem"},
              {"src":"/(.*)","dest":"/index.html"}
            ]
          }
          VCEOF
          echo "✅ Vercel Build Output pronto em .vercel/output/"

      - name: ↩️ Deploy rollback em HML
        id: deploy
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_HML }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt \
            --token="$VERCEL_TOKEN" \
            --yes \
            --meta version="${{ needs.detect-version.outputs.target_version }}" \
            --meta environment=hml \
            --meta rollback=true \
            --meta rollback_from="${{ needs.detect-version.outputs.current_version }}" \
            --meta rollback_reason="${{ inputs.reason }}" \
            2>/dev/null)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "❌ Vercel não retornou URL. Output de diagnóstico:"
            vercel deploy --prebuilt --token="$VERCEL_TOKEN" --yes --meta environment=hml 2>&1 || true
            exit 1
          fi

          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Rollback HML deployado: ${DEPLOY_URL}"

      # ── Registra o rollback no histórico de deployments ───────────────────────
      - name: 💾 Registrar rollback no histórico de HML
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.detect-version.outputs.target_version }}',
              environment: 'hml',
              description: 'Version: ${{ needs.detect-version.outputs.target_version }}',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Rollback from ${{ needs.detect-version.outputs.current_version }}'
            });

      - name: 🏥 Health Check pós-rollback HML
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS="unhealthy"
          for i in {1..8}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}" || echo "000")
            if [[ "${HTTP_CODE}" == "200" || "${HTTP_CODE}" == "401" ]]; then
              STATUS="healthy"
              [[ "${HTTP_CODE}" == "401" ]] && echo "ℹ️ HTTP 401 — preview protegido por Vercel Auth (normal em preview)"
              break
            fi
            echo "⏳ Tentativa ${i}/8 — HTTP ${HTTP_CODE}"; sleep 15
          done
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

      - name: 📊 Sumário — Rollback HML
        if: always()
        run: |
          RESULT="${{ job.status }}"
          ICON=$([[ "${RESULT}" == "success" ]] && echo "✅" || echo "❌")

          echo "## ${ICON} Relatório Rollback — HML"                                       >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Item                | Detalhe                                          |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------------------|--------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ♻️ Revertido de     | \`${{ needs.detect-version.outputs.current_version }}\` → \`${{ needs.detect-version.outputs.target_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚙️ Configuração     | ng build --configuration=staging (reconstruído)  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 URL              | ${{ steps.deploy.outputs.url }}                  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build            | $([[ '${{ steps.build.outcome }}' == 'success' ]] && echo '✅ Gerado' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏥 Health Check     | $([[ '${{ steps.health.outputs.status }}' == 'healthy' ]] && echo '✅ Saudável' || echo '❌ Verificar') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📝 Motivo           | ${{ inputs.reason }}                             |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Executado por    | @${{ github.actor }}                             |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Executado em     | $(date -u '+%Y-%m-%d %H:%M:%S UTC')              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏁 Resultado        | ${ICON} ${RESULT}                                |" >> "$GITHUB_STEP_SUMMARY"


  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔴 ROLLBACK PRD                                                         ║
  # ║                                                                            ║
  # ║  Rebuilda com as variáveis de PRD (VITE_ENV=production, etc.)            ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  rollback-prd:
    name: ↩️ Rollback → PRD
    runs-on: ubuntu-latest
    needs: [detect-version, approve-rollback]
    if: ${{ inputs.environment == 'prd' && needs.approve-rollback.result == 'success' }}
    permissions:
      deployments: write
      contents: read

    environment:
      name: prd
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout versão alvo (${{ needs.detect-version.outputs.target_version }})
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-version.outputs.target_version }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Instalar dependências
        run: npm ci --prefer-offline

      # ── Gera environment.production.ts com os secrets corretos ──────────────
      - name: 🔧 Gerar environment.production.ts — PRD (rollback)
        run: |
          cat > src/environments/environment.production.ts << 'EOF'
          export const environment = {
            name:       'production',
            production: true,
            apiUrl:     '${{ secrets.PRD_API_URL }}',
            version:    '${{ needs.detect-version.outputs.target_version }}',
          };
          EOF
          echo "✅ environment.production.ts gerado (rollback)"

      - name: 🏗️ Build Angular versão ${{ needs.detect-version.outputs.target_version }} — PRD
        id: build
        run: |
          npm run build:prod
          echo "✅ Build rollback PRD gerado"

      - name: 📦 Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: 🗂️ Criar estrutura Vercel Build Output (prebuilt)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/ceccoff-frontend/browser/. .vercel/output/static/
          cat > .vercel/output/config.json << 'VCEOF'
          {
            "version": 3,
            "routes": [
              {"src":"/assets/(.*)","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.js","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/(.*)\\.css","headers":{"cache-control":"public, max-age=31536000, immutable"},"continue":true},
              {"src":"/index\\.html","headers":{"cache-control":"no-cache, no-store, must-revalidate"},"continue":true},
              {"handle":"filesystem"},
              {"src":"/(.*)","dest":"/index.html"}
            ]
          }
          VCEOF
          echo "✅ Vercel Build Output pronto em .vercel/output/"

      - name: ↩️ Deploy rollback em PRD
        id: deploy
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRD }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod \
            --token="$VERCEL_TOKEN" \
            --yes \
            --meta version="${{ needs.detect-version.outputs.target_version }}" \
            --meta environment=prd \
            --meta rollback=true \
            --meta rollback_from="${{ needs.detect-version.outputs.current_version }}" \
            --meta rollback_reason="${{ inputs.reason }}" \
            2>/dev/null)

          if [[ -z "$DEPLOY_URL" ]]; then
            echo "❌ Vercel não retornou URL. Output de diagnóstico:"
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --yes --meta environment=prd 2>&1 || true
            exit 1
          fi

          echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ Rollback PRD deployado: ${DEPLOY_URL}"

      # ── Registra o rollback no histórico ─────────────────────────────────────
      - name: 💾 Registrar rollback no histórico de PRD
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.detect-version.outputs.target_version }}',
              environment: 'prd',
              description: 'Version: ${{ needs.detect-version.outputs.target_version }}',
              auto_merge: false,
              required_contexts: []
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: '${{ steps.deploy.outputs.url }}',
              description: 'Rollback from ${{ needs.detect-version.outputs.current_version }}'
            });

      - name: 🏥 Health Check pós-rollback PRD
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          STATUS="unhealthy"
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}" || echo "000")
            if [[ "${HTTP_CODE}" == "200" ]]; then STATUS="healthy"; break; fi
            echo "⏳ Tentativa ${i}/10 — HTTP ${HTTP_CODE}"; sleep 15
          done
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

          if [[ "${STATUS}" == "unhealthy" ]]; then
            echo "❌ CRÍTICO: Health check pós-rollback PRD falhou!"
            exit 1
          fi

      - name: 📊 Sumário — Rollback PRD
        if: always()
        run: |
          RESULT="${{ job.status }}"
          ICON=$([[ "${RESULT}" == "success" ]] && echo "✅" || echo "🚨")

          echo "## ${ICON} Relatório Rollback — PRODUÇÃO"                                  >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Item                | Detalhe                                          |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------------------|--------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ♻️ Revertido de     | \`${{ needs.detect-version.outputs.current_version }}\` → \`${{ needs.detect-version.outputs.target_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚙️ Configuração     | ng build --configuration=production (reconstruído)|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔗 URL              | ${{ steps.deploy.outputs.url }}                  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build            | $([[ '${{ steps.build.outcome }}' == 'success' ]] && echo '✅ Gerado' || echo '❌ Falhou') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏥 Health Check     | $([[ '${{ steps.health.outputs.status }}' == 'healthy' ]] && echo '✅ Saudável' || echo '🚨 CRÍTICO') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📝 Motivo           | ${{ inputs.reason }}                             |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Executado por    | @${{ github.actor }}                             |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Executado em     | $(date -u '+%Y-%m-%d %H:%M:%S UTC')              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏁 Resultado        | ${ICON} ${RESULT}                                |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${RESULT}" != "success" ]]; then
            echo ""                                                                        >> "$GITHUB_STEP_SUMMARY"
            echo "---"                                                                     >> "$GITHUB_STEP_SUMMARY"
            echo "### 🚨 Ação Imediata Necessária"                                        >> "$GITHUB_STEP_SUMMARY"
            echo "Rollback PRD falhou. Acione o time de plantão imediatamente."           >> "$GITHUB_STEP_SUMMARY"
          fi
