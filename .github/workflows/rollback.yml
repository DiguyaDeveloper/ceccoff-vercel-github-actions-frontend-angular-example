# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║           ↩️ ROLLBACK — CECCOFF FRONTEND (Angular + Vercel)               ║
# ║                                                                              ║
# ║  Detecta automaticamente a versão anterior via GitHub Deployments API       ║
# ║  Rebuilda com as variáveis do ambiente correto (NG_* baked in)             ║
# ║  Suporta: DEV, HML e PRD                                                    ║
# ║                                                                              ║
# ║  Composite Actions usadas (.github/actions/):                               ║
# ║    setup-deps          → node + npm ci + vercel CLI                        ║
# ║    generate-env-file   → gera environment.<env>.ts com secrets             ║
# ║    angular-build       → ng build + publica bundles no sumário             ║
# ║    vercel-build-output → prepara .vercel/output/ (SPA prebuilt)            ║
# ║    vercel-deploy       → vercel deploy --prebuilt, retorna URL             ║
# ║    register-deployment → GitHub Deployments API (rastreabilidade)          ║
# ║    health-check        → retry loop HTTP 200/401, modo strict              ║
# ║    deploy-summary      → relatório de rollback no GITHUB_STEP_SUMMARY      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: ↩️ Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '🌍 Ambiente para rollback'
        type: choice
        required: true
        options:
          - dev
          - hml
          - prd

      strategy:
        description: '♻️ Estratégia de rollback'
        type: choice
        required: true
        options:
          - 'automatico'      # Detecta e usa a versão anterior via GitHub Deployments API ← recomendado
          - 'tag-especifica'  # Especifique a tag manualmente abaixo

      target_tag:
        description: '🏷️ Tag Git alvo (ex: v1.2.3) — somente para estratégia "tag-especifica"'
        type: string
        required: false

      reason:
        description: '📝 Motivo do rollback (obrigatório para rastreabilidade)'
        type: string
        required: true

# ─────────────────────────────────────────────────────────────────────────────
# 🔒 PERMISSÕES MÍNIMAS (princípio do menor privilégio)
# Jobs que precisam de mais definem explicitamente
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  contents: read

concurrency:
  group: rollback-${{ inputs.environment }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: '20.x'
  APP_NAME: 'ceccoff-frontend'

jobs:

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔍 DETECTAR — Resolve a versão a ser restaurada                         ║
  # ║                                                                            ║
  # ║  Modo "automatico": consulta GitHub Deployments API e encontra a última  ║
  # ║  versão com sucesso ANTES da atual para o ambiente selecionado.           ║
  # ║                                                                            ║
  # ║  Exemplo real:                                                             ║
  # ║    PRD tem: v1.3.0 (atual), v1.2.1 (anterior), v1.1.0                   ║
  # ║    Rollback automático → v1.2.1 (não v1.2.1 do repo, mas o que estava   ║
  # ║    realmente deployado em PRD antes de v1.3.0)                           ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  detect-version:
    name: 🔍 Detectar Versão para Rollback
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      target_version: ${{ steps.resolve.outputs.target_version }}
      current_version: ${{ steps.resolve.outputs.current_version }}
      target_url: ${{ steps.resolve.outputs.target_url }}
      can_rollback: ${{ steps.resolve.outputs.can_rollback }}

    steps:
      - name: ⬇️ Checkout código
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔍 Resolver versão via GitHub Deployments API
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const env = '${{ inputs.environment }}';
            const strategy = '${{ inputs.strategy }}';
            const manualTag = '${{ inputs.target_tag }}';

            // Busca deployments do ambiente, ordenados do mais recente ao mais antigo
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: env,
              per_page: 20
            }).catch(() => ({ data: [] }));

            // Filtra apenas deployments com status 'success'
            const successful = [];
            for (const dep of deployments.data) {
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: dep.id,
                per_page: 1
              }).catch(() => ({ data: [] }));

              const latestStatus = statuses.data[0];
              if (latestStatus?.state === 'success') {
                successful.push({
                  version: dep.description?.replace('Version: ', '') || dep.ref,
                  url: latestStatus.environment_url || '',
                  deployed_at: dep.created_at,
                  id: dep.id
                });
              }
            }

            console.log(`Deployments bem-sucedidos em ${env}:`, JSON.stringify(successful, null, 2));

            if (successful.length === 0) {
              core.setFailed(`❌ Nenhum deployment bem-sucedido encontrado em ${env}`);
              return;
            }

            // Versão atual = a mais recente com sucesso
            const currentVersion = successful[0].version;
            core.setOutput('current_version', currentVersion);

            if (strategy === 'automatico') {
              if (successful.length < 2) {
                core.setFailed(`❌ Não há versão anterior em ${env}. Apenas 1 deployment encontrado: ${currentVersion}`);
                return;
              }
              // Versão anterior = segunda mais recente com sucesso
              const prev = successful[1];
              core.setOutput('target_version', prev.version);
              core.setOutput('target_url', prev.url);
              core.setOutput('can_rollback', 'true');
              console.log(`✅ Rollback automático: ${currentVersion} → ${prev.version}`);

            } else {
              // tag-especifica: valida que a tag informada existe
              if (!manualTag) {
                core.setFailed('❌ "target_tag" é obrigatório para estratégia "tag-especifica"');
                return;
              }
              const { execSync } = require('child_process');
              try {
                execSync(`git rev-parse ${manualTag}`, { stdio: 'pipe' });
              } catch {
                core.setFailed(`❌ Tag "${manualTag}" não encontrada no repositório`);
                return;
              }
              core.setOutput('target_version', manualTag);
              core.setOutput('target_url', '');
              core.setOutput('can_rollback', 'true');
              console.log(`✅ Rollback para tag específica: ${currentVersion} → ${manualTag}`);
            }

      - name: 📊 Sumário — Detecção
        run: |
          echo "## 🔍 Detecção de Versão para Rollback"                                   >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Item               | Detalhe                                           |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------------|---------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌍 Ambiente        | **${{ inputs.environment }}**                     |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ♻️ Estratégia      | \`${{ inputs.strategy }}\`                       |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Versão atual    | \`${{ steps.resolve.outputs.current_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🎯 Versão alvo     | \`${{ steps.resolve.outputs.target_version }}\`  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📝 Motivo          | ${{ inputs.reason }}                              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Solicitado por  | @${{ github.actor }}                              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Iniciado em     | $(date -u '+%Y-%m-%d %H:%M:%S UTC')               |" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "> Aguardando aprovação para executar o rollback..."                         >> "$GITHUB_STEP_SUMMARY"


  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔐 APROVAÇÃO — Gate de segurança                                        ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  approve-rollback:
    name: 🔐 Aprovar Rollback — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: [detect-version]
    if: ${{ needs.detect-version.outputs.can_rollback == 'true' }}
    timeout-minutes: 60  # gate humano — espera até 1 hora

    environment:
      name: Rollback - ${{ inputs.environment }}

    steps:
      - name: 🔐 Rollback autorizado — executando
        run: |
          echo "## 🔐 Rollback Autorizado"                                                 >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                                           >> "$GITHUB_STEP_SUMMARY"
          echo "| Item               | Detalhe                                           |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------------|---------------------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌍 Ambiente        | **${{ inputs.environment }}**                     |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔴 Revertendo de   | \`${{ needs.detect-version.outputs.current_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🎯 Restaurando para| \`${{ needs.detect-version.outputs.target_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 👤 Autorizado por  | @${{ github.actor }}                              |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 📅 Autorizado em   | $(date -u '+%Y-%m-%d %H:%M:%S UTC')               |" >> "$GITHUB_STEP_SUMMARY"

      - name: 📣 Notificar Slack — Rollback iniciando
        run: |
          ENV="${{ inputs.environment }}"
          FROM="${{ needs.detect-version.outputs.current_version }}"
          TO="${{ needs.detect-version.outputs.target_version }}"
          echo "⏪ [FAKE] Notificação PRÉ-rollback enviada ao Slack: ${ENV^^} ${FROM} → ${TO}"


  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔵 ROLLBACK DEV                                                         ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  rollback-dev:
    name: ↩️ Rollback → DEV
    runs-on: ubuntu-latest
    needs: [detect-version, approve-rollback]
    if: ${{ inputs.environment == 'dev' && needs.approve-rollback.result == 'success' }}
    timeout-minutes: 20
    permissions:
      deployments: write
      contents:    read

    environment:
      name: DEV - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout versão alvo (${{ needs.detect-version.outputs.target_version }})
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect-version.outputs.target_version }}
          fetch-depth: 0

      - name: 🛠️ Setup Node + npm ci + Vercel CLI
        uses: ./.github/actions/setup-deps
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔧 Gerar environment.ts — DEV
        uses: ./.github/actions/generate-env-file
        with:
          environment: dev
          api-url:     ${{ secrets.DEV_API_URL }}
          version:     ${{ needs.detect-version.outputs.target_version }}

      - name: 🏗️ Build Angular — DEV (rollback)
        id: build
        uses: ./.github/actions/angular-build
        with:
          script: build:dev
          label:  DEV (Rollback)

      - name: 🗂️ Preparar Vercel Build Output (SPA prebuilt)
        uses: ./.github/actions/vercel-build-output
        with:
          app-name: ${{ env.APP_NAME }}

      - name: ↩️ Vercel Deploy — DEV (rollback)
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token:        ${{ secrets.VERCEL_TOKEN }}
          org-id:       ${{ secrets.VERCEL_ORG_ID }}
          project-id:   ${{ secrets.VERCEL_PROJECT_ID_DEV }}
          environment:  dev
          version:      ${{ needs.detect-version.outputs.target_version }}
          prev-version: ${{ needs.detect-version.outputs.current_version }}
          rollback:     'true'
          rollback-from: ${{ needs.detect-version.outputs.current_version }}

      - name: 💾 Registrar rollback no histórico — DEV
        uses: ./.github/actions/register-deployment
        with:
          environment: dev
          version:     ${{ needs.detect-version.outputs.target_version }}
          url:         ${{ steps.deploy.outputs.url }}
          description: 'Rollback from ${{ needs.detect-version.outputs.current_version }}'

      - name: 🏥 Health Check pós-rollback — DEV
        id: health
        uses: ./.github/actions/health-check
        with:
          url:     ${{ steps.deploy.outputs.url }}
          retries: '6'
          wait:    '10'

      - name: 📊 Sumário — Rollback DEV
        if: always()
        uses: ./.github/actions/deploy-summary
        with:
          environment:   dev
          label:         DEV (Rollback)
          emoji:         ↩️
          config:        development
          version:       ${{ needs.detect-version.outputs.target_version }}
          url:           ${{ steps.deploy.outputs.url }}
          prev-version:  ${{ needs.detect-version.outputs.current_version }}
          build-outcome: ${{ steps.build.outcome }}
          health-status: ${{ steps.health.outputs.status }}
          actor:         ${{ github.actor }}

      - name: 📣 Notificar Slack — Rollback DEV concluído
        if: always()
        run: |
          RESULT="${{ job.status }}"
          FROM="${{ needs.detect-version.outputs.current_version }}"
          TO="${{ needs.detect-version.outputs.target_version }}"
          ICON=$([[ "${RESULT}" == "success" ]] && echo "✅" || echo "❌")
          echo "${ICON} [FAKE] Notificação PÓS-rollback DEV enviada ao Slack: ${FROM} → ${TO}"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🟡 ROLLBACK HML                                                         ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  rollback-hml:
    name: ↩️ Rollback → HML
    runs-on: ubuntu-latest
    needs: [detect-version, approve-rollback]
    if: ${{ inputs.environment == 'hml' && needs.approve-rollback.result == 'success' }}
    timeout-minutes: 25
    permissions:
      deployments: write
      contents:    read

    environment:
      name: HML - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout versão alvo (${{ needs.detect-version.outputs.target_version }})
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect-version.outputs.target_version }}
          fetch-depth: 0

      - name: 🛠️ Setup Node + npm ci + Vercel CLI
        uses: ./.github/actions/setup-deps
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔧 Gerar environment.ts — HML
        uses: ./.github/actions/generate-env-file
        with:
          environment: hml
          api-url:     ${{ secrets.HML_API_URL }}
          version:     ${{ needs.detect-version.outputs.target_version }}

      - name: 🏗️ Build Angular — HML (rollback)
        id: build
        uses: ./.github/actions/angular-build
        with:
          script: build:staging
          label:  HML (Rollback)

      - name: 🗂️ Preparar Vercel Build Output (SPA prebuilt)
        uses: ./.github/actions/vercel-build-output
        with:
          app-name: ${{ env.APP_NAME }}

      - name: ↩️ Vercel Deploy — HML (rollback)
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token:        ${{ secrets.VERCEL_TOKEN }}
          org-id:       ${{ secrets.VERCEL_ORG_ID }}
          project-id:   ${{ secrets.VERCEL_PROJECT_ID_HML }}
          environment:  hml
          version:      ${{ needs.detect-version.outputs.target_version }}
          prev-version: ${{ needs.detect-version.outputs.current_version }}
          rollback:     'true'
          rollback-from: ${{ needs.detect-version.outputs.current_version }}

      - name: 💾 Registrar rollback no histórico — HML
        uses: ./.github/actions/register-deployment
        with:
          environment: hml
          version:     ${{ needs.detect-version.outputs.target_version }}
          url:         ${{ steps.deploy.outputs.url }}
          description: 'Rollback from ${{ needs.detect-version.outputs.current_version }}'

      - name: 🏥 Health Check pós-rollback — HML
        id: health
        uses: ./.github/actions/health-check
        with:
          url:     ${{ steps.deploy.outputs.url }}
          retries: '8'
          wait:    '15'
          timeout: '15'
          strict:  'true'

      - name: 📊 Sumário — Rollback HML
        if: always()
        uses: ./.github/actions/deploy-summary
        with:
          environment:   hml
          label:         HML (Rollback)
          emoji:         ↩️
          config:        staging
          version:       ${{ needs.detect-version.outputs.target_version }}
          url:           ${{ steps.deploy.outputs.url }}
          prev-version:  ${{ needs.detect-version.outputs.current_version }}
          build-outcome: ${{ steps.build.outcome }}
          health-status: ${{ steps.health.outputs.status }}
          actor:         ${{ github.actor }}

      - name: 📣 Notificar Slack — Rollback HML concluído
        if: always()
        run: |
          RESULT="${{ job.status }}"
          FROM="${{ needs.detect-version.outputs.current_version }}"
          TO="${{ needs.detect-version.outputs.target_version }}"
          ICON=$([[ "${RESULT}" == "success" ]] && echo "✅" || echo "❌")
          echo "${ICON} [FAKE] Notificação PÓS-rollback HML enviada ao Slack: ${FROM} → ${TO}"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🔴 ROLLBACK PRD                                                         ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  rollback-prd:
    name: ↩️ Rollback → PRD
    runs-on: ubuntu-latest
    needs: [detect-version, approve-rollback]
    if: ${{ inputs.environment == 'prd' && needs.approve-rollback.result == 'success' }}
    timeout-minutes: 30
    permissions:
      deployments: write
      contents:    read

    environment:
      name: PRD - Deploy
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️ Checkout versão alvo (${{ needs.detect-version.outputs.target_version }})
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.detect-version.outputs.target_version }}
          fetch-depth: 0

      - name: 🛠️ Setup Node + npm ci + Vercel CLI
        uses: ./.github/actions/setup-deps
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔧 Gerar environment.ts — PRD
        uses: ./.github/actions/generate-env-file
        with:
          environment: prd
          api-url:     ${{ secrets.PRD_API_URL }}
          version:     ${{ needs.detect-version.outputs.target_version }}

      - name: 🏗️ Build Angular — PRD (rollback)
        id: build
        uses: ./.github/actions/angular-build
        with:
          script: build:prod
          label:  PRD (Rollback)

      - name: 🗂️ Preparar Vercel Build Output (SPA prebuilt)
        uses: ./.github/actions/vercel-build-output
        with:
          app-name: ${{ env.APP_NAME }}

      - name: ↩️ Vercel Deploy — PRD (rollback)
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          token:        ${{ secrets.VERCEL_TOKEN }}
          org-id:       ${{ secrets.VERCEL_ORG_ID }}
          project-id:   ${{ secrets.VERCEL_PROJECT_ID_PRD }}
          environment:  prd
          version:      ${{ needs.detect-version.outputs.target_version }}
          prev-version: ${{ needs.detect-version.outputs.current_version }}
          prod:         'true'
          rollback:     'true'
          rollback-from: ${{ needs.detect-version.outputs.current_version }}

      - name: 💾 Registrar rollback no histórico — PRD
        uses: ./.github/actions/register-deployment
        with:
          environment: prd
          version:     ${{ needs.detect-version.outputs.target_version }}
          url:         ${{ steps.deploy.outputs.url }}
          description: 'Rollback from ${{ needs.detect-version.outputs.current_version }}'

      - name: 🏥 Health Check pós-rollback — PRD
        id: health
        uses: ./.github/actions/health-check
        with:
          url:     ${{ steps.deploy.outputs.url }}
          retries: '10'
          wait:    '15'
          timeout: '15'
          strict:  'true'

      - name: 📊 Sumário — Rollback PRD
        if: always()
        uses: ./.github/actions/deploy-summary
        with:
          environment:   prd
          label:         PRD (Rollback)
          emoji:         ↩️
          config:        production
          version:       ${{ needs.detect-version.outputs.target_version }}
          url:           ${{ steps.deploy.outputs.url }}
          prev-version:  ${{ needs.detect-version.outputs.current_version }}
          build-outcome: ${{ steps.build.outcome }}
          health-status: ${{ steps.health.outputs.status }}
          actor:         ${{ github.actor }}

      - name: 📣 Notificar Slack — Rollback PRD concluído
        if: always()
        run: |
          RESULT="${{ job.status }}"
          FROM="${{ needs.detect-version.outputs.current_version }}"
          TO="${{ needs.detect-version.outputs.target_version }}"
          ICON=$([[ "${RESULT}" == "success" ]] && echo "✅" || echo "🚨")
          echo "${ICON} [FAKE] Notificação PÓS-rollback PRD enviada ao Slack: ${FROM} → ${TO}"

          if [[ "${RESULT}" != "success" ]]; then
            echo ""
            echo "🚨 ROLLBACK PRD FALHOU — acione o time de plantão imediatamente!"
          fi
