name: 'Generate Angular Environment File'
description: 'Injeta apiUrl (secret) no environment.<env>.ts. Versão lida do package.json em build-time.'

inputs:
  environment:
    description: 'Ambiente: dev | hml | prd'
    required: true
  api-url:
    description: 'URL da API para o ambiente (secret do chamador)'
    required: true

runs:
  using: composite
  steps:
    - name: 🔧 Gerar environment.ts — ${{ inputs.environment }}
      shell: bash
      run: |
        case "${{ inputs.environment }}" in
          dev)
            FILE="src/environments/environment.development.ts"
            NAME="development"
            PROD="false"
            VERSION_SUFFIX="-dev"
            ;;
          hml)
            FILE="src/environments/environment.staging.ts"
            NAME="staging"
            PROD="false"
            VERSION_SUFFIX="-staging"
            ;;
          prd)
            FILE="src/environments/environment.production.ts"
            NAME="production"
            PROD="true"
            VERSION_SUFFIX=""
            ;;
        esac

        # Versão lida do package.json em build-time via import TypeScript.
        # A action apenas injeta o apiUrl (secret) — version não é responsabilidade do CI.
        cat > "${FILE}" << 'TSEOF'
        import { version } from '../../package.json';
        TSEOF

        cat >> "${FILE}" << EOF
        export const environment = {
          name:       '${NAME}',
          production: ${PROD},
          apiUrl:     '${{ inputs.api-url }}',
          version:    \`\${version}${VERSION_SUFFIX}\`,
        };
        EOF

        echo "✅ ${FILE} gerado (env=${NAME}, apiUrl=*** versão via package.json${VERSION_SUFFIX})"
