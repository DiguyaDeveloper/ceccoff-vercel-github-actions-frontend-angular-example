name: 'SonarCloud Scan'
description: 'Executa análise estática com SonarCloud. Baixa coverage do artefato de CI para enriquecer a análise.'

inputs:
  sonar-token:
    description: 'SONAR_TOKEN (secret do SonarCloud)'
    required: true
  github-token:
    description: 'GITHUB_TOKEN para decorar o PR com resultados'
    required: true
  coverage-artifact:
    description: 'Nome do artefato de coverage gerado pelo job test'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: 📥 Download coverage report
      if: inputs.coverage-artifact != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.coverage-artifact }}
        path: coverage/
      continue-on-error: true  # análise roda mesmo sem coverage

    - name: 📊 SonarCloud Analysis
      uses: SonarSource/sonarcloud-github-action@v3.1.0
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SONAR_TOKEN:  ${{ inputs.sonar-token }}
