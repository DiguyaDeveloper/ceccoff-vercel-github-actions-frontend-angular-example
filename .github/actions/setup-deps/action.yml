# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  🛠️ Composite Action: setup-deps                                           ║
# ║                                                                              ║
# ║  IMPORTANTE: actions/checkout deve rodar ANTES desta action no job          ║
# ║  (actions locais só são carregadas após o repo estar disponível)            ║
# ║                                                                              ║
# ║  Agrupa os 3 passos de setup que se repetem em TODOS os jobs de deploy:     ║
# ║    1. Setup do Node.js com cache npm                                        ║
# ║    2. Instalação de dependências (npm ci --prefer-offline)                  ║
# ║    3. Instalação do Vercel CLI (versão pinada)                              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: 'Setup deps'
description: 'Node.js + npm ci + Vercel CLI. Requer actions/checkout antes no job chamador.'

inputs:
  node-version:
    description: 'Versão do Node.js'
    required: false
    default: '20.x'

runs:
  using: composite
  steps:
    - name: 🟢 Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: 📥 Instalar dependências
      shell: bash
      run: npm ci --prefer-offline

    - name: 📦 Instalar Vercel CLI
      shell: bash
      run: npm install -g vercel@37 --prefer-offline
