name: 'Vercel Deploy'
description: 'Executa vercel deploy --prebuilt e retorna a URL do deploy.'

inputs:
  token:
    description: 'VERCEL_TOKEN'
    required: true
  org-id:
    description: 'VERCEL_ORG_ID'
    required: true
  project-id:
    description: 'VERCEL_PROJECT_ID do ambiente'
    required: true
  environment:
    description: 'Ambiente: dev | hml | prd (usado nos metadados do deploy)'
    required: true
  version:
    description: 'Versão semântica'
    required: true
  sha-short:
    description: 'SHA curto do commit (opcional — omitir em rollback)'
    required: false
    default: ''
  prev-version:
    description: 'Versão anterior (metadado para rastreabilidade)'
    required: false
    default: 'none'
  prod:
    description: 'true para deploy em produção (--prod flag)'
    required: false
    default: 'false'
  rollback:
    description: 'true para rollback (adiciona metadata rollback=true)'
    required: false
    default: 'false'
  rollback-from:
    description: 'Versão de origem do rollback (metadata rollback_from)'
    required: false
    default: ''

outputs:
  url:
    description: 'URL do deploy Vercel'
    value: ${{ steps.deploy.outputs.url }}

runs:
  using: composite
  steps:
    - name: 🚀 Vercel Deploy — ${{ inputs.environment }}
      id: deploy
      shell: bash
      env:
        VERCEL_TOKEN:      ${{ inputs.token }}
        VERCEL_ORG_ID:     ${{ inputs.org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.project-id }}
      run: |
        FLAGS=()
        [[ "${{ inputs.prod }}" == "true" ]] && FLAGS+=(--prod)
        [[ -n "${{ inputs.sha-short }}" ]] && FLAGS+=(--meta "sha=${{ inputs.sha-short }}")
        [[ "${{ inputs.rollback }}" == "true" ]] && \
          FLAGS+=(--meta "rollback=true" --meta "rollback_from=${{ inputs.rollback-from }}")

        DEPLOY_URL=$(vercel deploy --prebuilt "${FLAGS[@]}" \
          --token="$VERCEL_TOKEN" --yes \
          --meta "version=${{ inputs.version }}" \
          --meta "environment=${{ inputs.environment }}" \
          --meta "prev_version=${{ inputs.prev-version }}" \
          2>/dev/null)

        if [[ -z "$DEPLOY_URL" ]]; then
          echo "❌ Vercel não retornou URL — verifique token, org-id e project-id para '${{ inputs.environment }}'"
          vercel deploy --prebuilt "${FLAGS[@]}" --token="$VERCEL_TOKEN" --yes 2>&1 || true
          exit 1
        fi

        echo "url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
        echo "✅ Deploy ${{ inputs.environment }}: ${DEPLOY_URL}"
